version: 1
purpose: "Per-family WORLD, AI Builder, and bot prompt contracts for HELLO TEST."
selection_rule: "Pick the closest golden family from user text, reference image, active world, or selected object."

domain_prompt_rules:
  world:
    - "Build a traversable rule-bearing world, not a prop scatter."
    - "Include one major landmark, route grammar, zones, rules, and visual continuity."
    - "Use collidable solids for gameplay and visual-only details for richness."
    - "Output must preserve spawn clearance and driving readability."
  ai_builder:
    - "Build one local focal construction inside the active world."
    - "Include base, silhouette, detail, material contrast, and one affordance."
    - "Do not change global atmosphere, terrain family, player rig, or game mode."
  bots:
    - "Bots must read the world, not act generically."
    - "Use routes, zones, hazards, landmarks, and material rules."
    - "Return structured actors, roles, patrols, triggers, and objectives."

families:
  - id: thor
    family: NORSE
    world_genome:
      title: "Storm Hammer Pass"
      seed: "A storm road shaped by hammer law, rune gates, wet stone, goat markers, and lightning pylons."
      world_type: "playable environment"
      embodiment_mode: "third-person chase"
      terrain_logic:
        biome: "storm mountain pass"
        landmark_system: ["hammer road", "rune gates", "lightning pylons", "goat side markers"]
        traversal_affordances: ["two driving lanes", "wet stone ramps", "gate thresholds", "safe central court"]
      rules:
        traction: 0.82
        visibility: "medium with lightning flashes"
        noise: "metal and stone impacts travel farther"
    inside_world:
      landmarks: ["hammer road", "cracked anvil court", "rune gate pair"]
      routes: ["main hammer lane", "goat-marker side path", "ramp over anvil crack"]
      zones: ["wet stone low traction", "rune boost strip", "lightning danger visual zone"]
      builder_targets: ["Rune Hammer Gate", "Cracked Anvil Shrine", "Lightning Battery"]
      bot_roles: ["rune guard", "goat scout", "storm charger"]
    world_prompt: "Build Storm Hammer Pass as a drivable Norse storm world. Make the road read like a hammer silhouette, add rune gates and lightning pylons, keep two clean lanes, and encode wet stone traction."
    ai_builder_prompt: "Build a Rune Hammer Gate with two stone uprights, hammer-head lintel, rune plates, small lightning rods, and a drive-through opening."
    bot_prompt: "Spawn rune guards that hold gate thresholds, goat scouts that patrol side paths, and storm chargers that ram across wet stone lanes."


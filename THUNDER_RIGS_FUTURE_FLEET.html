<style>

<script type="module">
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;

let initJolt;
try{({default:initJolt}=await import('https://cdn.jsdelivr.net/npm/jolt-physics@1.0.0/dist/jolt-physics.wasm-compat.js'))}

let viewHeight=62;

const cineCamera=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,.08,260);cineCamera.position.set(0,8,-12);
let camera=topCamera,cameraMode='top';
scene.add(new THREE.HemisphereLight(0xcfe6d9,0x102018,1.9));

const cameraDrone=new THREE.Group();
const droneBody=new THREE.Mesh(new THREE.SphereGeometry(.36,16,10),new THREE.MeshStandardMaterial({color:0x151b1d,roughness:.28,metalness:.7,emissive:0x051815,emissiveIntensity:.7}));cameraDrone.add(droneBody);
const droneLens=new THREE.Mesh(new THREE.CylinderGeometry(.14,.2,.28,14),new THREE.MeshStandardMaterial({color:0x19e6c8,roughness:.15,metalness:.5,emissive:0x19e6c8,emissiveIntensity:1.2}));droneLens.rotation.x=Math.PI/2;droneLens.position.z=.34;cameraDrone.add(droneLens);
for(const x of [-.58,.58]){const arm=new THREE.Mesh(new THREE.BoxGeometry(.65,.05,.08),new THREE.MeshStandardMaterial({color:0x333d3b,roughness:.5,metalness:.5}));arm.position.x=x;cameraDrone.add(arm);const rotor=new THREE.Mesh(new THREE.TorusGeometry(.22,.035,6,20),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.45}));rotor.rotation.x=Math.PI/2;rotor.position.x=x;cameraDrone.add(rotor)}
const aiCanvas=document.createElement('canvas');aiCanvas.width=96;aiCanvas.height=48;const ac=aiCanvas.getContext('2d');ac.fillStyle='#07100c';ac.fillRect(0,0,96,48);ac.strokeStyle='#19e6c8';ac.lineWidth=3;ac.strokeRect(2,2,92,44);ac.fillStyle='#ffffff';ac.font='900 24px monospace';ac.textAlign='center';ac.textBaseline='middle';ac.fillText('AI CAM',48,25);const aiTex=new THREE.CanvasTexture(aiCanvas);const aiBadge=new THREE.Mesh(new THREE.PlaneGeometry(.9,.45),new THREE.MeshBasicMaterial({map:aiTex,transparent:true}));aiBadge.position.set(0,.52,0);cameraDrone.add(aiBadge);cameraDrone.visible=false;scene.add(cameraDrone);
function material(color,rough=.65,metal=.03,emissive=0){return new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal,emissive,emissiveIntensity:emissive?0.45:0})}
function setShadows(obj){obj.traverse?.(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true}})}
function sync(body,obj){const p=body.GetPosition(),q=body.GetRotation();obj.position.set(p.GetX(),p.GetY(),p.GetZ());obj.quaternion.set(q.GetX(),q.GetY(),q.GetZ(),q.GetW())}
const rigidRecords=[];

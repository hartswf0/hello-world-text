<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f1216">
<title>THE PARIS MODEL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
:root{
  --bg:#0f1216;--bg2:#151a20;--bg3:#1b2129;
  --ink:#f2f5f7;--ink2:#cdd5dc;--label:#9fb0bd;--faint:#6f7d89;
  --line:#2b333c;--line2:#3d4753;
  --teal:#2ff0d2;--amber:#ffcf3f;--red:#ff5a52;--blue:#5b9bff;--green:#4ade80;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
  --mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;height:100dvh;background:var(--bg);color:var(--ink);font-family:var(--mono);overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
button,input,textarea{font:inherit;color:inherit} button{cursor:pointer;background:none;border:none}

/* ===== THE WORLD ===== */
#gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#glitch{position:fixed;inset:0;z-index:4;pointer-events:none;display:none;background:
  repeating-linear-gradient(0deg,#0f121600 0px,#0f121600 3px,#0f1216cc 3px,#0f1216cc 4px);}
#glitch.on{display:block}
#glitch .sig{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);text-align:center}
#glitch .sig b{display:block;font-size:clamp(20px,6vw,34px);font-weight:700;letter-spacing:.18em;color:var(--red)}
#glitch .sig s{display:block;text-decoration:none;font-size:11px;letter-spacing:.22em;color:var(--label);margin-top:8px}

/* ===== HUD (floats on the world) ===== */
#hud{position:fixed;z-index:6;top:calc(var(--st) + 12px);left:14px;right:14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
#hud .pill{background:#0f1216d9;border:1px solid var(--line2);padding:8px 12px;font-size:11px;letter-spacing:.1em;color:var(--ink2)}
#hud .pill b{color:var(--teal);letter-spacing:.14em}
#hud .right{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
#eng{background:#0f1216d9;border:1px solid var(--faint);color:var(--faint);padding:6px 10px;font-size:9px;letter-spacing:.12em}
#stepper{background:#0f1216d9;border:1px solid var(--line2);padding:6px 10px;font-size:9px;letter-spacing:.12em;color:var(--label)}
#stepper b{color:var(--ink)}

/* ===== TRANSPORT (bottom of world) ===== */
#dock{position:fixed;z-index:6;left:50%;transform:translateX(-50%);bottom:calc(var(--sb) + 12px);width:min(680px,calc(100vw - 24px));display:flex;flex-direction:column;gap:10px}
#transport{display:none;align-items:center;gap:10px;background:#0f1216e6;border:1px solid var(--line2);padding:10px 12px}
#transport.show{display:flex}
#transport button{flex:0 0 auto;width:40px;height:40px;border:1px solid var(--line2);display:grid;place-items:center;color:var(--teal)}
#transport button.tb{width:auto;padding:0 12px;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--ink2)}
#transport .tc{font-size:12px;color:var(--ink2);font-variant-numeric:tabular-nums;min-width:32px;text-align:center}
#transport .tr{flex:1;height:18px;background:var(--bg3);border:1px solid var(--line2);position:relative;cursor:pointer;touch-action:none}
#transport .tr .oc{position:absolute;top:0;bottom:0;background:repeating-linear-gradient(45deg,#ff5a5238,#ff5a5238 4px,transparent 4px,transparent 8px);border-left:1px solid var(--red);border-right:1px solid var(--red)}
#transport .tr .fl{position:absolute;left:0;top:0;bottom:0;background:#2ff0d230}
#transport .tr .hd{position:absolute;top:-2px;bottom:-2px;width:3px;background:var(--teal)}
#action{display:none}
#action.show{display:block}

/* ===== SHEETS (overlays that never fully cover the world) ===== */
#sheet{position:fixed;z-index:8;left:50%;transform:translateX(-50%);bottom:0;width:min(680px,100vw);max-height:78dvh;overflow-y:auto;background:#0f1216f5;border:1.5px solid var(--line2);border-bottom:none;padding:20px 18px calc(var(--sb) + 18px);display:none;touch-action:pan-y}
#sheet.show{display:block}
#veil{position:fixed;inset:0;z-index:7;background:#0f1216a6;display:none}
#veil.show{display:block}
#full{position:fixed;inset:0;z-index:10;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
#full.show{display:flex}

.h1{font-size:clamp(26px,8vw,42px);font-weight:700;letter-spacing:-.01em;line-height:1.02;margin:0 0 8px}
.h1 .dim{color:var(--label);font-weight:400}
.kick{font-size:10px;letter-spacing:.24em;color:var(--teal);margin-bottom:12px}
.sub{font-size:13px;line-height:1.6;color:var(--ink2);margin:0 0 16px;max-width:52ch}
.sub b{color:var(--ink)} .sub .r{color:var(--red)}
.btn{width:100%;display:flex;align-items:center;gap:14px;border:1.5px solid var(--teal);background:#151a20e6;padding:17px 18px;text-align:left;margin-top:10px;transition:background .12s}
.btn:active{background:var(--bg3)} .btn[disabled]{opacity:.4;pointer-events:none}
.btn .ic{flex:0 0 auto;width:26px;height:26px;color:var(--teal)}
.btn .t b{display:block;font-size:clamp(15px,4.4vw,18px);font-weight:700;color:var(--teal);letter-spacing:.02em}
.btn .t s{display:block;text-decoration:none;font-size:11px;color:var(--ink2);margin-top:4px;letter-spacing:.02em;line-height:1.4}
.btn .go{margin-left:auto;color:var(--teal);font-size:22px}
.btn.blue{border-color:var(--blue)} .btn.blue .ic,.btn.blue .t b,.btn.blue .go{color:var(--blue)}
.btn.amber{border-color:var(--amber)} .btn.amber .ic,.btn.amber .t b,.btn.amber .go{color:var(--amber)}
.btn.red{border-color:var(--red)} .btn.red .ic,.btn.red .t b,.btn.red .go{color:var(--red)}
.btn.ghost{border-color:var(--line2)} .btn.ghost .ic,.btn.ghost .t b,.btn.ghost .go{color:var(--ink)}

.field{width:100%;min-height:100px;resize:none;background:var(--bg3);border:1.5px solid var(--line2);padding:16px;font-size:16px;line-height:1.5;color:var(--ink);outline:none}
.field:focus{border-color:var(--teal)} .field::placeholder{color:var(--faint)}
.cc{display:flex;justify-content:flex-end;font-size:10px;color:var(--label);margin-top:5px;letter-spacing:.06em}
.fork{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.fork .f{border:1.5px solid var(--line2);background:#151a20e6;padding:16px;text-align:center}
.fork .f:active{background:var(--bg3)}
.fork .f b{display:block;font-size:17px;font-weight:700;letter-spacing:.04em}
.fork .f s{display:block;text-decoration:none;font-size:10px;color:var(--ink2);margin-top:5px;line-height:1.4}
.fork .f.swear{border-color:var(--teal)} .fork .f.swear b{color:var(--teal)}
.fork .f.float{border-color:var(--label)} .fork .f.float b{color:var(--ink)}

.card{border:1px solid var(--line);background:#151a20;padding:16px;margin-top:12px}
.card.blue{border-color:var(--blue)} .card.amber{border-color:var(--amber)} .card.teal{border-color:var(--teal)}
.card .lab{font-size:10px;letter-spacing:.14em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.card .lab .d{width:7px;height:7px}
.card.blue .lab{color:var(--blue)} .card.blue .lab .d{background:var(--blue)}
.card.amber .lab{color:var(--amber)} .card.amber .lab .d{background:var(--amber)}
.card.teal .lab{color:var(--teal)} .card.teal .lab .d{background:var(--teal)}
.card .say{font-size:clamp(15px,4.4vw,19px);line-height:1.45;color:var(--ink)}

.vrow{border:1px solid var(--line);background:#151a20;padding:14px;margin-top:10px}
.vrow.blue{border-left:3px solid var(--blue)} .vrow.amber{border-left:3px solid var(--amber)}
.vrow .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.vrow .nm{font-size:11px;font-weight:700;letter-spacing:.1em}
.vrow.blue .nm{color:var(--blue)} .vrow.amber .nm{color:var(--amber)}
.vrow .vd{font-size:10px;font-weight:700;letter-spacing:.08em;padding:4px 9px;border:1px solid}
.vd.t{color:var(--teal);border-color:var(--teal)} .vd.f{color:var(--red);border-color:var(--red)} .vd.u{color:var(--label);border-color:var(--label)}
.vrow .cl{font-size:14px;line-height:1.4;color:var(--ink);margin-bottom:6px}
.vrow .rz{font-size:11px;line-height:1.5;color:var(--ink2)}
.vrow .pts{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;padding-top:8px;border-top:1px solid var(--line)}
.vrow .pts .k{font-size:9px;letter-spacing:.08em;color:var(--label)}
.vrow .pts .v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.vrow.blue .pts .v{color:var(--blue)} .vrow.amber .pts .v{color:var(--amber)}
.ruler{display:flex;gap:8px;margin-top:8px}
.ruler button{flex:1;border:1px solid var(--line2);background:var(--bg3);padding:10px 4px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--label)}
.ruler button.on.t{border-color:var(--teal);color:var(--teal)}
.ruler button.on.f{border-color:var(--red);color:var(--red)}
.ruler button.on.u{border-color:var(--ink);color:var(--ink)}

.handoff-ic{width:52px;height:52px;margin-bottom:6px}
.handoff-l{font-size:10px;letter-spacing:.22em;color:var(--label)}
.handoff-who{font-size:clamp(30px,10vw,52px);font-weight:700;margin:10px 0}
.handoff-d{font-size:13px;color:var(--ink2);line-height:1.6;max-width:40ch}
#full.p1 .handoff-who,#full.p1 .handoff-ic{color:var(--blue)}
#full.p2 .handoff-who,#full.p2 .handoff-ic{color:var(--amber)}

.ai{border:1px solid;background:#151a20;padding:14px;margin-top:14px;text-align:left}
.ai.on{border-color:var(--teal)} .ai.off{border-color:var(--amber)}
.ai .h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ai .h .l{font-size:11px;font-weight:600;letter-spacing:.1em;display:flex;align-items:center;gap:8px}
.ai .h .l .d{width:7px;height:7px}
.ai.on .h .l{color:var(--teal)} .ai.on .h .l .d{background:var(--teal)}
.ai.off .h .l{color:var(--amber)} .ai.off .h .l .d{background:var(--amber)}
.ai .h .e{font-size:10px;letter-spacing:.08em;color:var(--label);cursor:pointer}
.ai .st{font-size:11px;letter-spacing:.02em}
.ai.on .st{color:var(--teal)} .ai.off .st{color:var(--amber)}
.eb{font-size:9px;letter-spacing:.14em;color:var(--label);margin:12px 0 6px;display:flex;align-items:center;gap:8px}
.eb::before{content:"";width:18px;height:1px;background:var(--line2)}
.aif{width:100%;background:var(--bg3);border:1px solid var(--line2);padding:11px 13px;font-family:var(--mono);font-size:13px;color:var(--ink);outline:none}
.aif:focus{border-color:var(--teal)} .aif::placeholder{color:var(--faint)}
.seg{display:flex;border:1px solid var(--line2)}
.seg button{flex:1;background:#151a20;border:none;border-right:1px solid var(--line2);color:var(--ink2);font-size:10px;font-weight:600;letter-spacing:.05em;padding:10px 2px}
.seg button:last-child{border-right:none} .seg button.on{background:var(--teal);color:var(--bg)}
.aibtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.aibtns .btn{margin-top:0;justify-content:center;gap:0;padding:12px}
.err{border:1px solid var(--red);background:#151a20;color:#ffb3ae;padding:13px;margin-top:12px;font-size:12px;line-height:1.5;text-align:left}
.mid{text-align:center;padding:26px 8px}
.spin{width:34px;height:34px;border:2px solid var(--line2);border-top-color:var(--teal);border-radius:50%;margin:0 auto 14px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.mid .l{font-size:10px;letter-spacing:.2em;color:var(--teal);margin-bottom:6px}
.mid .d{font-size:12px;color:var(--ink2);line-height:1.6;max-width:36ch;margin:0 auto}
.note{font-size:10px;line-height:1.5;color:var(--faint);margin-top:10px}
svg.mk{width:100%;height:100%;display:block;stroke-linecap:square;stroke-linejoin:miter}
.score-pill{display:flex;gap:14px;justify-content:center;font-size:12px;letter-spacing:.08em;margin-top:6px}
.score-pill .p1{color:var(--blue)} .score-pill .p2{color:var(--amber)}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="glitch"><div class="sig"><b>SIGNAL LOST</b><s>THE CAMERA MISSED THIS MOMENT</s></div></div>

<div id="hud">
  <div class="pill" id="hudL"><b>THE PARIS MODEL</b></div>
  <div class="right">
    <div id="eng">ENGINE: APPROX</div>
    <div id="stepper"></div>
  </div>
</div>

<div id="dock">
  <div id="transport">
    <button id="pb"></button><span class="tc" id="tc">0.0</span>
    <div class="tr" id="trk"><div class="oc" id="occband"></div><div class="fl" id="fl"></div><div class="hd" id="hd"></div></div>
    <span class="tc" id="td">0.0</span><button class="tb" id="camb">ORBIT</button>
  </div>
  <div id="action"></div>
</div>

<div id="veil"></div>
<div id="sheet"></div>
<div id="full"></div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const n=document.createElement(t);if(c)n.className=c;if(h!=null)n.innerHTML=h;return n;};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const other=p=>p==='p1'?'p2':'p1';
const NAME={p1:'PLAYER ONE',p2:'PLAYER TWO'};
const D2R=Math.PI/180;
const MK={
 play:`<svg class="mk" viewBox="0 0 24 24" fill="currentColor"><path d="M8 6 v12 l9-6 z"/></svg>`,
 pause:`<svg class="mk" viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="6" width="4" height="12"/><rect x="13" y="6" width="4" height="12"/></svg>`,
 gavel:`<svg class="mk" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="11" height="6" transform="rotate(-40 8.5 7)"/><line x1="12" y1="13" x2="24" y2="25"/><line x1="17" y1="26" x2="27" y2="26"/></svg>`,
 eye:`<svg class="mk" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 15 s5-8 12-8 12 8 12 8-5 8-12 8-12-8-12-8z"/><circle cx="15" cy="15" r="3.5"/></svg>`,
 flag:`<svg class="mk" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="7" y1="3" x2="7" y2="27"/><path d="M7 5 h15 l-3 4 l3 4 h-15"/></svg>`,
 check:`<svg class="mk" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="15" cy="15" r="11"/><path d="M9 15 l4 4 l8-9"/></svg>`,
 replay:`<svg class="mk" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M23 15 a8 8 0 1 1-3-6"/><path d="M23 5 v5 h-5"/></svg>`,
 hand:`<svg class="mk" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M11 15 V7 a2 2 0 0 1 4 0 v6 M15 13 V6 a2 2 0 0 1 4 0 v7 M19 13 V8 a2 2 0 0 1 4 0 v9 a6 6 0 0 1-6 6 h-2 a6 6 0 0 1-5-3 l-3-5 a2 2 0 0 1 3-2 l2 2"/></svg>`,
};

/* =====================================================================
   1 · AI PLUMBING — client key, direct call. Hosted https only.
   ===================================================================== */
const AI_KEY='paris.ai.config.v1';
const AI_DEF={anthropic:{model:'claude-sonnet-4-6',endpoint:'https://api.anthropic.com/v1/messages'},openai:{model:'gpt-5.4-mini',endpoint:'https://api.openai.com/v1/responses'},gemini:{model:'gemini-2.5-flash',endpoint:''},custom:{model:'',endpoint:''}};
function getAI(){let s={};try{s=JSON.parse(localStorage.getItem(AI_KEY)||'{}');}catch(_){}const p=s.provider||'anthropic';const d=AI_DEF[p]||AI_DEF.anthropic;return{provider:p,model:s.model||d.model,endpoint:s.endpoint||d.endpoint,apiKey:s.apiKey||''};}
function setAI(c){const p=c.provider||'anthropic';const d=AI_DEF[p]||AI_DEF.anthropic;localStorage.setItem(AI_KEY,JSON.stringify({provider:p,model:(c.model||d.model||'').trim(),endpoint:(c.endpoint||d.endpoint||'').trim(),apiKey:(c.apiKey||'').trim()}));}
const aiReady=()=>!!getAI().apiKey;
async function callLLM(system,user){
  const c=getAI();if(!c.apiKey)throw new Error('NO_KEY');const {provider:pv,model}=c;
  if(pv==='gemini'){const base=c.endpoint||`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent`;const url=base.includes('?')?`${base}&key=${encodeURIComponent(c.apiKey)}`:`${base}?key=${encodeURIComponent(c.apiKey)}`;
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:system}]},contents:[{role:'user',parts:[{text:user}]}],generationConfig:{responseMimeType:'application/json'}})});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error?.message||('Gemini '+r.status));return (j.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('\n');}
  if(pv==='anthropic'){const r=await fetch(c.endpoint,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':c.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,max_tokens:1400,system,messages:[{role:'user',content:user}]})});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error?.message||('Anthropic '+r.status));return (j.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');}
  if(pv==='openai'){const r=await fetch(c.endpoint,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${c.apiKey}`},body:JSON.stringify({model,instructions:system,input:user,max_output_tokens:1400})});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error?.message||('OpenAI '+r.status));if(typeof j.output_text==='string')return j.output_text;if(Array.isArray(j.output))return j.output.map(o=>o.content?.map(x=>x.text||'').join('\n')||'').join('\n');return j.choices?.[0]?.message?.content||'';}
  if(!c.endpoint)throw new Error('MISSING_ENDPOINT');
  const r=await fetch(c.endpoint,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${c.apiKey}`},body:JSON.stringify({model,messages:[{role:'system',content:system},{role:'user',content:user}],temperature:0.7})});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error?.message||('HTTP '+r.status));return j.choices?.[0]?.message?.content||'';
}
async function llmJSON(system,user){const t=await callLLM(system,user);return JSON.parse(String(t).replace(/```json/gi,'').replace(/```/g,'').trim());}

/* =====================================================================
   2 · SCENARIO — the AI (or builtin) authors INITIAL CONDITIONS ONLY.
   Physics produces the event. Headings are code-aimed at the conflict
   point and arrival times matched so a collision actually occurs.
   ===================================================================== */
const COLORS={red:0xc0392b,blue:0x2b6cb0,white:0xd9dde1,gray:0x6b7480,amber:0xd9a62e,green:0x3e7a52};
async function aiScenario(){
  const sys=`You author the SETUP of ONE road collision for a physics engine. You do NOT write the motion — you write CAUSES: where each vehicle comes from, how fast, and whether/when it brakes. A rigid-body simulation rolls your conditions forward; the crash that results is real. Return ONLY JSON.

Also write "gap_truth": 1-2 plain sentences stating the CAUSE of the crash (who ran the light / who was speeding / who braked too late) — this is the hidden truth a judge later uses. Make fault clear but arguable.

Schema:
{"title":"<=5 words","place":"SHORT LOCATION","conditions":{"time":"day|dusk|night"},
 "conflict":[x,z],
 "vehicles":[
  {"id":"veh_a","type":"sedan|suv|truck","color":"red|blue|white|gray|amber|green","role":"ego",
   "dist":28,"approach":270,"speed":13,"brakeAt":1.2,"brake":0.7},
  {"id":"veh_b","type":"sedan|suv|truck","color":"...","role":"other",
   "dist":30,"approach":0,"speed":16,"brakeAt":null,"brake":0}
 ],
 "gap_truth":"..."}
Rules: conflict in [-6..6]. 2 vehicles. dist 24..36 (meters from conflict). approach = compass degrees the vehicle comes FROM (0,90,180,270 ± 20). speed 9..18 m/s. brakeAt seconds or null (no braking). One vehicle should clearly cause it. Vary everything each time.`;
  const sc=await llmJSON(sys,'Author one fresh collision setup now. Vary from any previous.');
  return normalizeScenario(sc);
}
function builtinScenario(){
  const R=(a,b)=>a+Math.random()*(b-a);
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const types=['sedan','suv','truck'];const cols=Object.keys(COLORS);
  const appA=pick([0,90,180,270])+R(-15,15);
  const appB=((appA+90+pick([0,90,180]))%360)+R(-15,15);
  const fast={id:'veh_b',type:pick(types),color:pick(cols),role:'other',dist:R(26,34),approach:appB,speed:R(14,18),brakeAt:null,brake:0};
  const ego={id:'veh_a',type:pick(types),color:pick(cols.filter(c=>c!==fast.color)),role:'ego',dist:R(26,34),approach:appA,speed:R(9,13),brakeAt:R(0.8,1.6),brake:R(0.5,0.9)};
  const sc={title:'INTERSECTION STRIKE',place:pick(['5TH & OAK','RIVERSIDE & MAIN','DEPOT CROSSING','LOWER BRIDGE RD']),
    conditions:{time:pick(['day','dusk','night'])},conflict:[R(-3,3),R(-3,3)],vehicles:[ego,fast],
    gap_truth:`The ${fast.color} ${fast.type} entered the crossing at roughly ${fast.speed.toFixed(0)} m/s without braking; the ${ego.color} ${ego.type} had already begun braking. The ${fast.color} ${fast.type} caused the collision.`};

/* 1D arrival: time for a vehicle to cover `dist` under its decel profile.
   Returns {t} on arrival or {stopShort:metersCovered} if it rests early. */
function arrival1D(v){
  let s=0,vel=v.speed,t=0;
  const aBase=PHY.muRoll*PHY.g;
  for(let i=0;i<PHY.MAX_STEPS;i++){
    if(s>=v.dist)return{t};
    if(vel<PHY.restV)return{stopShort:s};
    const braking=(v.brakeAt!=null&&t>=v.brakeAt)?v.brake:0;
    vel-=(aBase+braking*PHY.muBrake*PHY.g+PHY.drag*vel*vel)*PHY.dt;
    s+=Math.max(vel,0)*PHY.dt;t+=PHY.dt;
  }
  return{stopShort:s};
}
function normalizeScenario(sc){
  sc.vehicles=(sc.vehicles||[]).slice(0,3);
  sc.conflict=[clamp(sc.conflict?.[0]??0,-6,6),clamp(sc.conflict?.[1]??0,-6,6)];
  const arr=[];
  for(const v of sc.vehicles){
    v.dist=clamp(Number(v.dist)||28,20,40);
    v.speed=clamp(Number(v.speed)||12,7,20);
    v.brake=clamp(Number(v.brake)||0,0,1);
    if(v.brakeAt!=null)v.brakeAt=clamp(Number(v.brakeAt),0.2,4);
    // a braking car must still REACH the conflict: iteratively delay brake
    // onset until arrival1D proves it arrives (guards roll/drag decay exactly)
    if(v.brakeAt!=null&&v.brake>0.05){
      for(let k=0;k<10;k++){
        const a=arrival1D(v);
        if(a.t!=null)break;
        const short=Math.max(0.3,v.dist-(a.stopShort||0));
        v.brakeAt=clamp(v.brakeAt+short/Math.max(v.speed*0.5,2)+0.15,0.2,8);
      }
    }
    const a=(Number(v.approach)||0)*D2R;
    v.entryPos=[sc.conflict[0]+Math.sin(a)*v.dist, sc.conflict[1]+Math.cos(a)*v.dist];
    v.heading=Math.atan2(sc.conflict[0]-v.entryPos[0], sc.conflict[1]-v.entryPos[1])/D2R;
    arr.push(v);
  }
  // match TRUE arrival times (profile-aware), iterating speed of followers
  if(arr.length>=2){
    const a0=arrival1D(arr[0]);const T0=a0.t!=null?a0.t:arr[0].dist/arr[0].speed;
    for(let i=1;i<arr.length;i++){
      for(let k=0;k<4;k++){
        const ai=arrival1D(arr[i]);const Ti=ai.t!=null?ai.t:1e9;
        if(Math.abs(Ti-T0)<0.1)break;
        arr[i].speed=clamp(arr[i].speed*(Ti===1e9?1.2:Ti/T0),7,20);
      }
    }
  }
  if(!sc.gap_truth)sc.gap_truth='The vehicles met in the hidden moment; one of them failed to yield.';
  return sc;
}

/* =====================================================================
   3 · PHYSICS — simulate(scenario) -> RECORDING. The only motion source.
   Jolt (WASM) when it loads; validated planar integrator WITH collision
   response as fallback. Deterministic recording: scrub/replay exact.
   ===================================================================== */
const PHY={dt:1/60, maxT:12, restV:0.25, muRoll:0.02, muBrake:0.62, muSlide:0.42, g:9.81, drag:0.003, carR:1.35, MAX_STEPS:900};
function simulateApprox(sc){
  const cars=sc.vehicles.map(v=>({x:v.entryPos[0],z:v.entryPos[1],
    vx:Math.sin(v.heading*D2R)*v.speed, vz:Math.cos(v.heading*D2R)*v.speed,
    yaw:v.heading*D2R, spin:0, brakeAt:v.brakeAt, brake:v.brake, hit:false}));
  const frames=[]; let impact=null; let t=0; let steps=0; let restSince=null;
  while(steps++<PHY.MAX_STEPS){
    for(const c of cars){
      const v=Math.hypot(c.vx,c.vz);
      const braking=(c.brakeAt!=null&&t>=c.brakeAt)?c.brake:0;
      const mu=PHY.muRoll + braking*PHY.muBrake + (c.hit?PHY.muSlide:0);
      if(v>PHY.restV){
        const decel=mu*PHY.g+PHY.drag*v*v;const nx=c.vx/v,nz=c.vz/v;
        c.vx-=nx*decel*PHY.dt;c.vz-=nz*decel*PHY.dt;
        if((c.vx*nx+c.vz*nz)<0){c.vx=0;c.vz=0;}
        c.x+=c.vx*PHY.dt;c.z+=c.vz*PHY.dt;
        if(!c.hit)c.yaw=Math.atan2(c.vx,c.vz);else{c.yaw+=c.spin*PHY.dt;c.spin*=0.985;}
      }else{c.vx=0;c.vz=0;c.yaw+=c.spin*PHY.dt;c.spin*=0.9;}
    }
    // pairwise collision (disc approximation, impulse + spin)
    for(let i=0;i<cars.length;i++)for(let j=i+1;j<cars.length;j++){
      const a=cars[i],b=cars[j];const dx=b.x-a.x,dz=b.z-a.z;const d=Math.hypot(dx,dz);
      if(d<PHY.carR*2&&d>1e-4){
        const nx=dx/d,nz=dz/d;
        const rel=(a.vx-b.vx)*nx+(a.vz-b.vz)*nz;
        if(rel>0){
          const e=0.35,imp=(1+e)*rel/2;
          a.vx-=nx*imp;a.vz-=nz*imp;b.vx+=nx*imp;b.vz+=nz*imp;
          const tx=-nz,tz=nx;const tv=(a.vx-b.vx)*tx+(a.vz-b.vz)*tz;
          a.spin+=tv*0.45;b.spin-=tv*0.45;a.hit=b.hit=true;
          if(!impact)impact={t,at:[(a.x+b.x)/2,(a.z+b.z)/2],speeds:sc.vehicles.map((_,k)=>+Math.hypot(cars[k].vx,cars[k].vz).toFixed(1))};
        }
        const push=(PHY.carR*2-d)/2;a.x-=nx*push;a.z-=nz*push;b.x+=nx*push;b.z+=nz*push;
      }
    }
    frames.push(cars.map(c=>({x:c.x,z:c.z,yaw:c.yaw})));
    const allRest=cars.every(c=>Math.hypot(c.vx,c.vz)<PHY.restV&&Math.abs(c.spin)<0.15);
    if(allRest){ if(restSince==null)restSince=t; if(t-restSince>1.0)break; } else restSince=null;
    t+=PHY.dt;
  }
  return finishRecording(frames,impact,'approx',sc);
}
/* ---- REAL ENGINE: Jolt WASM. Verified: wiring+fallback. The WASM fetch
   itself needs a host where cdn.jsdelivr.net is reachable (your site). ---- */
const JOLT_CDN='https://cdn.jsdelivr.net/npm/jolt-physics@0.31.0/dist/jolt-physics.wasm-compat.js';
let JOLT=null,joltState='idle',joltIface=null,joltSys=null,joltBodies=[];
async function joltInit(){
  if(joltState==='ready'||joltState==='failed')return joltState;
  joltState='loading';
  try{
    const mod=await import(/* @vite-ignore */ JOLT_CDN);
    const init=mod.default||mod.initJolt||window.initJolt;
    JOLT=await init();
    const settings=new JOLT.JoltSettings();
    joltIface=new JOLT.Jolt(settings);
    joltSys=joltIface.GetPhysicsSystem();
    joltSys.SetGravity(new JOLT.Vec3(0,-PHY.g,0));
    const bi=joltSys.GetBodyInterface();
    const gShape=new JOLT.BoxShape(new JOLT.Vec3(120,0.5,120),0.05,null);
    bi.CreateAndAddBody(new JOLT.BodyCreationSettings(gShape,new JOLT.RVec3(0,-0.5,0),new JOLT.Quat(0,0,0,1),JOLT.EMotionType_Static,1),JOLT.EActivation_Activate);
    for(let i=0;i<3;i++){
      const s=new JOLT.BoxShape(new JOLT.Vec3(0.95,0.55,2.2),0.05,null);
      const bs=new JOLT.BodyCreationSettings(s,new JOLT.RVec3(1000+i*10,0.6,1000),new JOLT.Quat(0,0,0,1),JOLT.EMotionType_Dynamic,2);
      bs.mFriction=PHY.muSlide;bs.mRestitution=0.25;bs.mLinearDamping=0.06;bs.mAngularDamping=0.6;
      joltBodies.push(bi.CreateAndAddBody(bs,JOLT.EActivation_Activate));
    }
    joltState='ready';
  }catch(e){console.warn('[jolt] unavailable:',e.message||e);joltState='failed';}
  return joltState;
}
function simulateJolt(sc){
  const bi=joltSys.GetBodyInterface();const N=sc.vehicles.length;
  sc.vehicles.forEach((v,i)=>{
    const yaw=v.heading*D2R;const q={x:0,y:Math.sin(yaw/2),z:0,w:Math.cos(yaw/2)};
    bi.SetPositionAndRotation(joltBodies[i],new JOLT.RVec3(v.entryPos[0],0.6,v.entryPos[1]),new JOLT.Quat(q.x,q.y,q.z,q.w),JOLT.EActivation_Activate);
    bi.SetLinearVelocity(joltBodies[i],new JOLT.Vec3(Math.sin(yaw)*v.speed,0,Math.cos(yaw)*v.speed));
    bi.SetAngularVelocity(joltBodies[i],new JOLT.Vec3(0,0,0));
  });
  for(let i=N;i<3;i++)bi.SetPositionAndRotation(joltBodies[i],new JOLT.RVec3(1000+i*10,0.6,1000),new JOLT.Quat(0,0,0,1),JOLT.EActivation_DontActivate);
  const frames=[];let impact=null;let t=0;let steps=0;let restSince=null;
  while(steps++<PHY.MAX_STEPS){
    // braking = horizontal damping per vehicle when past brakeAt
    sc.vehicles.forEach((v,i)=>{
      const braking=(v.brakeAt!=null&&t>=v.brakeAt)?v.brake:0;
      if(braking>0){const lv=bi.GetLinearVelocity(joltBodies[i]);const k=1-braking*0.055;

    });

    const snap=[];let maxSpd=0;let minPair=1e9;
    for(let i=0;i<N;i++){
      const p=bi.GetPosition(joltBodies[i]);const r=bi.GetRotation(joltBodies[i]);const lv=bi.GetLinearVelocity(joltBodies[i]);
      const qx=r.GetX(),qy=r.GetY(),qz=r.GetZ(),qw=r.GetW();
      const yaw=Math.atan2(2*(qw*qy+qx*qz),1-2*(qy*qy+qx*qx));
      snap.push({x:p.GetX(),z:p.GetZ(),yaw});
      maxSpd=Math.max(maxSpd,Math.hypot(lv.GetX(),lv.GetZ()));
    }
    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++)minPair=Math.min(minPair,Math.hypot(snap[i].x-snap[j].x,snap[i].z-snap[j].z));
    if(!impact&&minPair<PHY.carR*2.1){
      impact={t,at:[(snap[0].x+snap[1].x)/2,(snap[0].z+snap[1].z)/2],
        speeds:sc.vehicles.map((_,k)=>{const lv=bi.GetLinearVelocity(joltBodies[k]);return +Math.hypot(lv.GetX(),lv.GetZ()).toFixed(1);})};
    }
    frames.push(snap);
    if(maxSpd<PHY.restV){ if(restSince==null)restSince=t; if(t-restSince>1.0)break; } else restSince=null;
    t+=PHY.dt;
  }
  return finishRecording(frames,impact,'jolt',sc);
}
function finishRecording(frames,impact,engine,sc){
  const duration=frames.length*PHY.dt;
  if(!impact)impact={t:duration*0.5,at:[sc.conflict[0],sc.conflict[1]],speeds:sc.vehicles.map(v=>+v.speed.toFixed(1))};
  const occ={fromT:clamp(impact.t-0.9,0.3,duration),toT:clamp(impact.t+0.9,0.3,duration)};

  return {frames,dt:PHY.dt,duration,impact,occ,engine,rest};
}
function simulate(sc){
  if(joltState==='ready'&&joltSys){try{return simulateJolt(sc);}catch(e){console.warn('[jolt] step failed:',e.message||e);joltState='failed';setEng();}}

  // sparks
  for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];s.userData.life-=dt*1.4;
    s.position.addScaledVector(s.userData.v,dt);s.userData.v.y-=18*dt;
    if(s.position.y<0.08){s.position.y=0.08;s.userData.v.y*=-0.3;s.userData.v.multiplyScalar(0.7);}
    s.material.opacity=Math.max(0,s.userData.life);
    if(s.userData.life<=0){scene.remove(s);sparks.splice(i,1);}}
  renderer.render(scene,cam);
}
function fit(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h,false);cam.aspect=w/h;cam.updateProjectionMatrix();}
addEventListener('resize',fit);fit();frame();
/* drag orbit */
(()=>{let id=null,lx=0;const cv=$('#gl');
  cv.addEventListener('pointerdown',e=>{id=e.pointerId;lx=e.clientX;cv.setPointerCapture(id);});
  cv.addEventListener('pointermove',e=>{if(e.pointerId===id){camYaw+=(e.clientX-lx)*0.006;lx=e.clientX;if(camMode!=='chase')camMode='orbitHold';}});
  cv.addEventListener('pointerup',e=>{if(e.pointerId===id){id=null;if(camMode==='orbitHold')camMode='orbit';}});
})();

/* transport wiring */
$('#pb').innerHTML=MK.pause;
$('#pb').onclick=function(){G.playing=!G.playing;this.innerHTML=G.playing?MK.pause:MK.play;};
(()=>{const trk=$('#trk');let s=false;const go=cx=>{const r=trk.getBoundingClientRect();G.playing=false;$('#pb').innerHTML=MK.play;seek(clamp((cx-r.left)/r.width,0,1)*(G.rec?G.rec.duration:0));};
  trk.addEventListener('pointerdown',e=>{s=true;trk.setPointerCapture(e.pointerId);go(e.clientX);});
  trk.addEventListener('pointermove',e=>{if(s)go(e.clientX);});
  trk.addEventListener('pointerup',()=>s=false);})();
const CAMS=['ORBIT','CHASE','IMPACT'];let camI=0;
$('#camb').onclick=()=>{camI=(camI+1)%3;camMode=CAMS[camI].toLowerCase();$('#camb').textContent=CAMS[camI];};
function setTransport(rec){
  const oL=clamp(rec.occ.fromT/rec.duration*100,0,100),oW=clamp((rec.occ.toT-rec.occ.fromT)/rec.duration*100,0,100);
  $('#occband').style.left=oL+'%';$('#occband').style.width=(G.occludeOn?oW:0)+'%';
  $('#td').textContent=rec.duration.toFixed(1);
}
function setEng(){const b=$('#eng');
  if(joltState==='ready'){b.textContent='ENGINE: JOLT';b.style.color='var(--green)';b.style.borderColor='var(--green)';}
  else if(joltState==='loading'){b.textContent='ENGINE: LOADING\u2026';b.style.color='var(--amber)';b.style.borderColor='var(--amber)';}
  else{b.textContent='ENGINE: APPROX';b.style.color='var(--faint)';b.style.borderColor='var(--faint)';}
}
function setHud(){
  const sc=G.sc;
  $('#hudL').innerHTML=sc?`<b>${(sc.title||'WRECK').toUpperCase()}</b> · ${(sc.place||'').toUpperCase()} · ${(sc.conditions?.time||'').toUpperCase()}`:'<b>THE PARIS MODEL</b>';
  const steps={watch:'1/4 WATCH',claim:'2/4 CLAIM',accuse:'3/4 ACCUSE',truth:'4/4 TRUTH'};
  $('#stepper').innerHTML=steps[G.step]?`STEP <b>${steps[G.step]}</b>`:'';
  $('#stepper').style.display=steps[G.step]?'block':'none';
}

/* =====================================================================
   6 · GAME FLOW — splash -> watch -> claim -> accuse -> truth
   ===================================================================== */
const sheet=$('#sheet'),veil=$('#veil'),full=$('#full'),action=$('#action');
function showSheet(on){sheet.classList.toggle('show',on);veil.classList.toggle('show',on);}
function showFull(on,cls){full.className=cls?cls:'';full.classList.toggle('show',on);}
function setAction(html){action.innerHTML=html||'';action.classList.toggle('show',!!html);}
function trans(on){$('#transport').classList.toggle('show',on);}

async function makeRound(){
  showSheet(true);sheet.innerHTML=loading('BUILDING THE WORLD',aiReady()?'The model is authoring the causes; the physics engine is rolling them forward.':'Generating a collision and rolling it through the physics engine.');
  try{
    G.sc=aiReady()?await aiScenario():builtinScenario();
  }catch(e){
    sheet.innerHTML='';sheet.appendChild(errCard(e));
    const rb=el('button','btn red');rb.innerHTML=`<span class="ic">${MK.replay}</span><span class="t"><b>RETRY</b></span><span class="go">&rsaquo;</span>`;rb.onclick=makeRound;sheet.appendChild(rb);
    const ob=el('button','btn ghost');ob.innerHTML=`<span class="ic">${MK.play}</span><span class="t"><b>PLAY OFFLINE INSTEAD</b><s>BUILT-IN WRECK, NO MODEL</s></span><span class="go">&rsaquo;</span>`;
    ob.onclick=()=>{G.sc=builtinScenario();afterScenario();};sheet.appendChild(ob);
    return;
  }
  afterScenario();
}
function afterScenario(){
  G.rec=simulate(G.sc);
  setTimeOfDay(G.sc.conditions?.time||'day');
  buildCars(G.sc);buildTrails(G.rec,G.sc);
  G.claim={p1:null,p2:null};G.accuse={p1:false,p2:false};G.verdicts=null;G.manual={p1:null,p2:null};G.roundPts=null;
  G.occludeOn=true;G.revealMode=false;G._impFired=false;
  trailLines.forEach(l=>l.visible=false);
  G.step='watch';render();
}
function render(){
  showSheet(false);showFull(false);setHud();
  ({splash,watch,claim,accuse,truth}[G.step]||splash)();
}
/* ---- SPLASH ---- */
function splash(){
  trans(false);setAction('');
  showSheet(true);
  sheet.innerHTML='';
  sheet.appendChild(el('div',null,`<div class="kick">TWO PLAYERS · ONE HIDDEN MOMENT</div>
    <h1 class="h1">THE <span class="dim">PARIS</span> MODEL</h1>
    <p class="sub">A crash happens in this world — <b>real physics, real collision</b> — but the camera loses the decisive moment. Each of you claims what happened in the gap. Then it's revealed. Lie and get caught, you lose.</p>`));
  const start=el('button','btn');
  start.innerHTML=`<span class="ic">${MK.gavel}</span><span class="t"><b>START</b><s>${aiReady()?'AI AUTHORS THE CAUSES · PHYSICS MAKES THE CRASH':'BUILT-IN WRECK · CONNECT A MODEL FOR AI WRECKS + AI JUDGE'}</s></span><span class="go">&rsaquo;</span>`;
  start.onclick=makeRound;sheet.appendChild(start);
  if(G.total.p1||G.total.p2)sheet.appendChild(el('div','score-pill',`<span class="p1">P1 ${G.total.p1}</span><span class="p2">P2 ${G.total.p2}</span>`));
  const aiw=el('div');sheet.appendChild(aiw);aiPanel(aiw);
}
/* ---- WATCH ---- */
function watch(){
  trans(true);setTransport(G.rec);G.occludeOn=true;
  $('#occband').style.width=(clamp((G.rec.occ.toT-G.rec.occ.fromT)/G.rec.duration*100,0,100))+'%';
  seek(0);G.playing=true;$('#pb').innerHTML=MK.pause;camMode='impact';camI=2;$('#camb').textContent='IMPACT';
  setAction(`<button class="btn" id="toClaim" style="margin-top:0"><span class="ic">${MK.eye}</span><span class="t"><b>WE'VE SEEN IT — START CLAIMS</b><s>PASS THE PHONE TO PLAYER ONE</s></span><span class="go">&rsaquo;</span></button>`);
  $('#toClaim').onclick=()=>{G.turn='p1';G.step='claim';handoff();};
}
/* ---- HANDOFF ---- */
function handoff(){
  setHud();trans(false);setAction('');showSheet(false);
  const p=G.turn;showFull(true,p==='p1'?'p1':'p2');
  const verb=G.step==='claim'?'make their claim':'decide if it\u2019s a lie';
  full.innerHTML=`<span class="handoff-ic">${MK.hand}</span><div class="handoff-l">PASS THE PHONE TO</div>
    <div class="handoff-who">${NAME[p]}</div>
    <div class="handoff-d">It's ${NAME[p].toLowerCase()}'s turn to ${verb}. No peeking.</div>`;
  const go=el('button','btn '+(p==='p1'?'blue':'amber'));go.style.maxWidth='420px';
  go.innerHTML=`<span class="ic">${MK.check}</span><span class="t"><b>I'M ${NAME[p]}</b></span><span class="go">&rsaquo;</span>`;
  go.onclick=()=>render();full.appendChild(go);
}
/* ---- CLAIM ---- */
function claim(){
  trans(true);G.occludeOn=true;G.playing=true;
  const p=G.turn,rec=G.rec;
  showSheet(true);
  sheet.innerHTML='';
  sheet.appendChild(el('div',null,`<h1 class="h1" style="font-size:clamp(22px,6.6vw,30px)">YOUR CLAIM</h1>
    <p class="sub" style="margin-bottom:12px">Between <b>${rec.occ.fromT.toFixed(1)}s</b> and <b>${rec.occ.toT.toFixed(1)}s</b> the signal was lost. One sentence: what happened in the gap — the version that helps you.</p>`));
  const ta=el('textarea','field');ta.maxLength=160;ta.placeholder='e.g. The other car blew through without braking and hit me.';
  sheet.appendChild(ta);sheet.appendChild(el('div','cc','<span id="cc">0 / 160</span>'));
  ta.oninput=()=>$('#cc').textContent=`${ta.value.length} / 160`;
  const fork=el('div','fork');
  const sw=el('button','f swear','<b>SWEAR IT</b><s>I SAW THIS. Worth more if true — costs more if it\u2019s a lie.</s>');
  const fl=el('button','f float','<b>FLOAT IT</b><s>I think this. Safer, worth less.</s>');
  fork.appendChild(sw);fork.appendChild(fl);sheet.appendChild(fork);
  const submit=stake=>{const t=ta.value.trim();if(t.length<4){toast('SAY WHAT HAPPENED FIRST');return;}
    G.claim[p]={text:t.slice(0,160),stake};
    if(p==='p1'){G.turn='p2';G.step='claim';handoff();}
    else{G.turn='p1';G.step='accuse';handoff();}};
  sw.onclick=()=>submit('SWEAR');fl.onclick=()=>submit('FLOAT');
}
/* ---- ACCUSE ---- */
function accuse(){
  trans(true);G.occludeOn=true;G.playing=true;
  const p=G.turn,o=other(p),cl=G.claim[o];
  showSheet(true);sheet.innerHTML='';
  sheet.appendChild(el('div',null,`<h1 class="h1" style="font-size:clamp(22px,6.6vw,30px)">IS IT A LIE?</h1>
    <p class="sub" style="margin-bottom:6px">${NAME[o]} claims this about the hidden moment. Call it right and gain; call it wrong and pay.</p>`));
  const card=el('div','card '+(o==='p1'?'blue':'amber'));
  card.innerHTML=`<div class="lab"><span class="d"></span>${NAME[o]} · ${cl?cl.stake:'—'}</div><div class="say">"${cl?cl.text:'—'}"</div>`;
  sheet.appendChild(card);
  const call=el('button','btn red');call.innerHTML=`<span class="ic">${MK.flag}</span><span class="t"><b>CALL IT A LIE</b></span><span class="go">&rsaquo;</span>`;
  const stand=el('button','btn ghost');stand.innerHTML=`<span class="ic">${MK.check}</span><span class="t"><b>LET IT STAND</b></span><span class="go">&rsaquo;</span>`;
  const submit=acc=>{G.accuse[p]=acc;if(p==='p1'){G.turn='p2';G.step='accuse';handoff();}else{G.step='truth';beginTruth();}};
  call.onclick=()=>submit(true);stand.onclick=()=>submit(false);
  sheet.appendChild(call);sheet.appendChild(stand);
}
/* ---- TRUTH ---- */
async function beginTruth(){
  render();
  if(aiReady()){try{await judgeRound();}catch(e){}}
  paintVerdicts();
}
function truth(){
  trans(true);G.occludeOn=false;G.revealMode=true;
  $('#occband').style.width='0%';
  trailLines.forEach(l=>l.visible=true);
  seek(0);G.playing=true;$('#pb').innerHTML=MK.pause;camMode='impact';camI=2;$('#camb').textContent='IMPACT';
  showSheet(true);sheet.innerHTML='';
  const rec=G.rec;
  sheet.appendChild(el('div',null,`<h1 class="h1" style="font-size:clamp(22px,6.6vw,30px)">THE TRUTH</h1>
    <p class="sub" style="margin-bottom:8px">The gap is revealed — the crash replays in full, with each car's real path drawn on the road.</p>`));
  const gt=el('div','card teal');
  gt.innerHTML=`<div class="lab"><span class="d"></span>WHAT HAPPENED</div><div class="say">${G.sc.gap_truth}</div>
    <div class="note">PHYSICS: impact at ${rec.impact.t.toFixed(1)}s · speeds at impact ${rec.impact.speeds.join(' / ')} m/s · engine ${rec.engine.toUpperCase()}</div>`;
  sheet.appendChild(gt);
  sheet.appendChild(el('div',null,'<div id="judgebox"></div>'));
  if(G.verdicts)paintVerdicts();
  else if(aiReady())$('#judgebox').innerHTML=loading('THE JUDGE IS RULING','Checking each claim against the truth and the physics record.');
  else paintManualRuling();
}
async function judgeRound(){
  const rec=G.rec;
  const sys=`You are a NEUTRAL JUDGE for a bluffing game about a real physics-simulated crash. You KNOW the hidden truth (the authored cause) and the PHYSICS FACTS (measured from the simulation). Rule each player's one-sentence claim about the hidden moment. Return ONLY JSON.
Verdicts: "TRUE" (consistent with truth+physics), "FALSE" (contradicts them — a lie), "UNSUPPORTED" (neither confirmed nor denied). One short reason each.
Schema: {"p1":{"verdict":"TRUE|FALSE|UNSUPPORTED","reason":"..."},"p2":{"verdict":"TRUE|FALSE|UNSUPPORTED","reason":"..."}}`;
  const payload={hidden_truth:G.sc.gap_truth,
    physics_facts:{impact_time_s:+rec.impact.t.toFixed(2),speeds_at_impact_mps:rec.impact.speeds,
      rest_positions:rec.rest,vehicles:G.sc.vehicles.map(v=>({id:v.id,type:v.type,color:v.color,role:v.role,entry_speed:+v.speed.toFixed(1),braked:v.brakeAt!=null}))},
    occluded_window:rec.occ,claims:{p1:G.claim.p1?.text||'',p2:G.claim.p2?.text||''}};
  let r;try{r=await llmJSON(sys,JSON.stringify(payload));}catch(e){r=null;}
  const ok=v=>['TRUE','FALSE','UNSUPPORTED'].includes(v)?v:'UNSUPPORTED';
  if(r){G.verdicts={p1:{verdict:ok(r.p1?.verdict),reason:r.p1?.reason||''},p2:{verdict:ok(r.p2?.verdict),reason:r.p2?.reason||''}};}
}
function score(v){
  const pts={p1:0,p2:0};const line={p1:[],p2:[]};
  for(const p of['p1','p2']){const o=other(p);const cl=G.claim[p]||{stake:'FLOAT'};const vd=v[p].verdict;const accused=G.accuse[o];
    let d=0,why='';
    if(vd==='TRUE'){d=cl.stake==='SWEAR'?3:1;why=cl.stake==='SWEAR'?'Sworn claim held (+3)':'Claim held (+1)';}
    else if(vd==='FALSE'){if(accused){d=-2;why='Lie, caught (\u22122)';}else{d=cl.stake==='SWEAR'?2:1;why='Lie slipped through ('+(cl.stake==='SWEAR'?'+2':'+1')+')';}}
    else{d=1;why='Unprovable guess (+1)';}
    pts[p]+=d;line[p].push(why);
    if(G.accuse[p]){if(v[o].verdict==='FALSE'){pts[p]+=2;line[p].push('Caught '+NAME[o]+'\u2019s lie (+2)');}else{pts[p]-=1;line[p].push('False accusation (\u22121)');}}
  }
  return{p1:pts.p1,p2:pts.p2,line};
}
function paintVerdicts(){
  const box=$('#judgebox');if(!box||!G.verdicts)return;
  if(G.roundPts==null){G.roundPts=score(G.verdicts);G.total.p1+=G.roundPts.p1;G.total.p2+=G.roundPts.p2;}
  box.innerHTML='';
  for(const p of['p1','p2']){const cl=G.claim[p]||{text:'—',stake:'—'};const vd=G.verdicts[p].verdict;const cls=vd==='TRUE'?'t':vd==='FALSE'?'f':'u';
    const row=el('div','vrow '+(p==='p1'?'blue':'amber'));
    row.innerHTML=`<div class="top"><span class="nm">${NAME[p]} · ${cl.stake}</span><span class="vd ${cls}">${vd}</span></div>
      <div class="cl">"${cl.text}"</div><div class="rz">${G.verdicts[p].reason}</div>
      <div class="pts"><span class="k">${(G.roundPts.line[p]||[]).join(' · ')}</span><span class="v">${G.roundPts[p]>=0?'+':''}${G.roundPts[p]}</span></div>`;
    box.appendChild(row);}
  endButtons(box);
}
function paintManualRuling(){
  const box=$('#judgebox');if(!box)return;box.innerHTML='';
  box.appendChild(el('p','sub','No model connected — <b>rule it at the table.</b> Read each claim against the truth above and tap a verdict together.'));
  for(const p of['p1','p2']){const cl=G.claim[p]||{text:'—',stake:'—'};
    const row=el('div','vrow '+(p==='p1'?'blue':'amber'));
    row.innerHTML=`<div class="top"><span class="nm">${NAME[p]} · ${cl.stake}</span></div><div class="cl">"${cl.text}"</div>`;
    const r=el('div','ruler');
    [['TRUE','t'],['FALSE','f'],['UNSUPPORTED','u']].forEach(([lab,c])=>{
      const b=el('button',null,lab);b.onclick=()=>{G.manual[p]=lab;r.querySelectorAll('button').forEach(x=>x.className='');b.className='on '+c;maybeScoreManual();};
      r.appendChild(b);});
    row.appendChild(r);box.appendChild(row);}
  box.appendChild(el('div',null,'<div id="manualGo"></div>'));
}
function maybeScoreManual(){
  const go=$('#manualGo');if(!go)return;go.innerHTML='';
  if(G.manual.p1&&G.manual.p2){
    const b=el('button','btn');b.innerHTML=`<span class="ic">${MK.gavel}</span><span class="t"><b>SCORE IT</b></span><span class="go">&rsaquo;</span>`;
    b.onclick=()=>{G.verdicts={p1:{verdict:G.manual.p1,reason:'Table ruling.'},p2:{verdict:G.manual.p2,reason:'Table ruling.'}};paintVerdicts();};
    go.appendChild(b);
  }
}
function endButtons(box){
  const lead=G.total.p1===G.total.p2?null:(G.total.p1>G.total.p2?'p1':'p2');
  box.appendChild(el('div','card teal',`<div class="lab"><span class="d"></span>MATCH</div>
    <div class="say">${lead?NAME[lead]+' LEADS':'TIED'}</div>
    <div class="score-pill" style="justify-content:flex-start"><span class="p1">P1 ${G.total.p1}</span><span class="p2">P2 ${G.total.p2}</span></div>`));
  const again=el('button','btn');again.innerHTML=`<span class="ic">${MK.replay}</span><span class="t"><b>NEXT WRECK</b><s>NEW CAUSES · NEW CRASH · NEW GAP</s></span><span class="go">&rsaquo;</span>`;
  again.onclick=makeRound;box.appendChild(again);
  const done=el('button','btn ghost');done.innerHTML=`<span class="ic">${MK.check}</span><span class="t"><b>END MATCH</b></span><span class="go">&rsaquo;</span>`;
  done.onclick=()=>{G.step='splash';render();};box.appendChild(done);
}
/* ---- AI PANEL ---- */
function aiPanel(mount,forceOpen){
  const c=getAI();const open=forceOpen||false;mount.innerHTML='';
  const box=el('div','ai '+(c.apiKey?'on':'off'));
  box.innerHTML=`<div class="h"><span class="l"><span class="d"></span>MODEL</span><span class="e" id="aie">${open?'HIDE':'EDIT'}</span></div>
    <div class="st">${c.apiKey?`CONNECTED · ${c.provider.toUpperCase()} · ${c.model}`:'NO MODEL — BUILT-IN WRECKS + TABLE RULING. CONNECT FOR AI WRECKS + AI JUDGE.'}</div>`;
  const form=el('div');form.style.display=open?'block':'none';
  form.innerHTML=`<div class="eb">PROVIDER</div><div class="seg" id="prov"><button data-v="anthropic">CLAUDE</button><button data-v="openai">OPENAI</button><button data-v="gemini">GEMINI</button><button data-v="custom">CUSTOM</button></div>
    <div class="eb">MODEL</div><input class="aif" id="mdl" spellcheck="false" value="${(c.model||'').replace(/"/g,'&quot;')}">
    <div class="eb">ENDPOINT <span style="color:var(--faint)">(optional)</span></div><input class="aif" id="ep" spellcheck="false" placeholder="default" value="${(c.endpoint||'').replace(/"/g,'&quot;')}">
    <div class="eb">API KEY <span style="color:var(--faint)">(this browser only · temporary key · hosted https)</span></div><input class="aif" id="key" type="password" spellcheck="false" placeholder="paste key" value="${(c.apiKey||'').replace(/"/g,'&quot;')}">
    <div class="aibtns"><button class="btn ghost" id="sv"><span class="t"><b>SAVE</b></span></button><button class="btn ghost" id="ts"><span class="t"><b>TEST</b></span></button></div>
    <div class="st" id="msg" style="margin-top:8px;min-height:13px;color:var(--label)"></div>`;
  box.appendChild(form);mount.appendChild(box);
  const prov=()=>form.querySelector('.seg button.on')?.dataset.v||c.provider;
  const paint=x=>form.querySelectorAll('.seg button').forEach(b=>b.classList.toggle('on',b.dataset.v===x));paint(c.provider);
  form.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{paint(b.dataset.v);const d=AI_DEF[b.dataset.v]||AI_DEF.anthropic;form.querySelector('#mdl').value=d.model;form.querySelector('#ep').value=d.endpoint;});
  box.querySelector('#aie').onclick=()=>aiPanel(mount,!open);
  form.querySelector('#sv').onclick=()=>{setAI({provider:prov(),model:form.querySelector('#mdl').value,endpoint:form.querySelector('#ep').value,apiKey:form.querySelector('#key').value});toast('SAVED');render();};
  form.querySelector('#ts').onclick=async()=>{setAI({provider:prov(),model:form.querySelector('#mdl').value,endpoint:form.querySelector('#ep').value,apiKey:form.querySelector('#key').value});const m=form.querySelector('#msg');m.textContent='Testing\u2026';try{const t=await callLLM('Reply with the word READY.','READY');m.style.color='var(--teal)';m.textContent='OK · '+String(t).trim().slice(0,30);}catch(e){m.style.color='var(--red)';m.textContent='FAILED · '+(e.message||e);}};
}
/* ---- bits ---- */
function loading(l,d){return `<div class="mid"><div class="spin"></div><div class="l">${l}</div><div class="d">${d}</div></div>`;}
function errCard(e){const msg=(e&&e.message)||e+'';const keyish=/NO_KEY|MISSING_ENDPOINT|401|403|invalid|api key|CORS|Failed to fetch|NetworkError/i.test(msg);
  return el('div','err',keyish?`Couldn't reach the model: ${msg}. Check the key — and this must run hosted (https), not from a file.`:`Failed: ${msg}.`);}
let toastN=null;
function toast(m){if(toastN)toastN.remove();toastN=el('div');toastN.textContent=m;toastN.style.cssText='position:fixed;left:50%;top:13%;transform:translateX(-50%);z-index:99;background:var(--bg2);border:1px solid var(--ink);padding:11px 15px;font-size:11px;letter-spacing:.1em;color:var(--ink)';document.body.appendChild(toastN);setTimeout(()=>{toastN&&toastN.remove();toastN=null;},1700);}

/* =====================================================================
   7 · BOOT — the world is alive before any key: builtin wreck plays
   behind the splash. Jolt attempts to come online in the background.
   ===================================================================== */
G.sc=builtinScenario();
G.rec=simulate(G.sc);
setTimeOfDay(G.sc.conditions?.time||'day');
buildCars(G.sc);buildTrails(G.rec,G.sc);
G.occludeOn=false;G.playing=true;seek(0);
G.step='splash';render();setEng();
joltInit().then(st=>{setEng();
  if(st==='ready'){toast('JOLT PHYSICS ONLINE');
    // re-roll the current attract scene through the real engine
    G.rec=simulate(G.sc);buildTrails(G.rec,G.sc);seek(0);}
});

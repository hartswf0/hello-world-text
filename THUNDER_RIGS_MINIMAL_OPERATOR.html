<style>

#coach{bottom:calc(12px + var(--safe-b));max-width:calc(100vw - 380px)}

@media(max-width:620px){#hud{height:44px}#brand{min-width:105px;padding:6px 8px}#brand b{font-size:8px}.stat{padding:5px 7px}.stat b{font-size:12px}#buttons .ui-btn{width:44px;height:44px}#engine{top:calc(58px + var(--safe-t))}}

#buttons,#routes,#insight,#coach{display:none!important}
#hud{height:46px;align-items:center;border-color:#ffffff50;background:#050807d9}
#brand{min-width:112px;height:100%}#brand b{font-size:9px}#brand small{font-size:6px}

#operator-dock,#operator-surface{position:static!important;left:auto!important;bottom:auto!important;transform:none!important;max-width:none!important;width:100%;min-height:0!important;display:grid!important;pointer-events:auto!important}

function captureShotSnapshot(){if(!ballBody||sinking)return;const cp=carBody.GetPosition(),cq=carBody.GetRotation(),cv=carBody.GetLinearVelocity(),cav=carBody.GetAngularVelocity(),bp=ballBody.GetPosition(),bq=ballBody.GetRotation(),bv=ballBody.GetLinearVelocity(),bav=ballBody.GetAngularVelocity();shotSnapshot={strokes,total,car:{p:[cp.GetX(),cp.GetY(),cp.GetZ()],q:[cq.GetX(),cq.GetY(),cq.GetZ(),cq.GetW()],v:[cv.GetX(),cv.GetY(),cv.GetZ()],av:[cav.GetX(),cav.GetY(),cav.GetZ()]},ball:{p:[bp.GetX(),bp.GetY(),bp.GetZ()],q:[bq.GetX(),bq.GetY(),bq.GetZ(),bq.GetW()],v:[bv.GetX(),bv.GetY(),bv.GetZ()],av:[bav.GetX(),bav.GetY(),bav.GetZ()]}};updateRewindUI()}

document.querySelectorAll('.route-btn').forEach(btn=>btn.addEventListener('click',()=>{if(!ballBody||sinking)return;const live=ballState();if(live&&live.v.length()>.4)return toast('BALL STILL LIVE');const type=btn.dataset.route,aim=routeAim(type),power=type==='direct'?.78:type==='bank'?.95:1.08;showPrediction(aim,power);strikeBall(aim,power)}));

    prevBallSpeed=ballSpeed;updateActualTrail(dt,bs);probeShotEvents(bs,ballSpeed);updateRouteVisibility(ballSpeed);

  }

function setPointer(e){const r=renderer.domElement.getBoundingClientRect();pointerNdc.x=((e.clientX-r.left)/r.width)*2-1;pointerNdc.y=-((e.clientY-r.top)/r.height)*2+1;raycaster.setFromCamera(pointerNdc,camera);raycaster.ray.intersectPlane(groundPlane,rayHit);return rayHit.clone()}

renderer.domElement.addEventListener('pointermove',e=>{if(!pointerState.down||e.pointerId!==pointerState.id)return;e.preventDefault();pointerState.lastX=e.clientX;pointerState.lastY=e.clientY;setPointer(e);pointerState.world.copy(rayHit);if(pointerState.ballDrag){const d=Math.hypot(e.clientX-pointerState.startX,e.clientY-pointerState.startY),power=clamp(d/150,.35,1.35);$('power-fill').style.width=clamp(d/2.5,18,100)+'%';updateAimLine(rayHit);showPrediction(rayHit,power)}});

const cameraFocus=new THREE.Vector3();let last=performance.now(),acc=0;const fixed=1/60;let replayAccumulator=0;
function renderStates(){if(replay.active)return{cs:{p:carRoot.position.clone(),q:carRoot.quaternion.clone(),v:new THREE.Vector3()},bs:ballMesh?{p:ballMesh.position.clone(),v:new THREE.Vector3()}:null};return{cs:carState(),bs:ballState()}}
function updateCamera(dt){const {cs,bs:rawBs}=renderStates(),bs=rawBs||{p:cupPos};let focus=cs.p.clone(),targetHeight=58;const aspect=innerWidth/innerHeight;
  if(cameraMode==='top'){camera=topCamera;if(currentMode==='golf'){if(viewMode==='overview'){focus=bs.p.clone().add(cupPos).multiplyScalar(.5);focus.lerp(cs.p,.12);targetHeight=82}else if(aiming||auto.mode==='strike'){focus=bs.p.clone().lerp(cs.p,.22);targetHeight=46}else if(shotActive){focus=bs.p.clone().lerp(cupPos,.08);targetHeight=54}else{focus=cs.p.clone().add(bs.p).multiplyScalar(.5);focus.lerp(cupPos,.12);const spread=Math.max(cs.p.distanceTo(bs.p),bs.p.distanceTo(cupPos),cs.p.distanceTo(cupPos)*.65);targetHeight=clamp(43+spread*.32,48,76)}}else{focus=cs.p.clone().lerp(bs.p,.25);targetHeight=58}focus.y=0;cameraFocus.lerp(focus,1-Math.exp(-dt*4));viewHeight=lerp(viewHeight,targetHeight,1-Math.exp(-dt*3));topCamera.left=-viewHeight*aspect/2;topCamera.right=viewHeight*aspect/2;topCamera.top=viewHeight/2;topCamera.bottom=-viewHeight/2;topCamera.updateProjectionMatrix();topCamera.position.copy(cameraFocus).add(new THREE.Vector3(0,58,26));topCamera.lookAt(cameraFocus)}
  else{camera=cineCamera;cineCamera.aspect=aspect;cineCamera.updateProjectionMatrix();const forward=new THREE.Vector3(0,0,1).applyQuaternion(cs.q).normalize(),right=new THREE.Vector3(1,0,0).applyQuaternion(cs.q).normalize();let desired,target=cs.p.clone().add(new THREE.Vector3(0,.7,0));if(cameraMode==='chase'){desired=cs.p.clone().addScaledVector(forward,-10).add(new THREE.Vector3(0,5.2,0));target.addScaledVector(forward,7)}else if(cameraMode==='driver'){desired=cs.p.clone().add(new THREE.Vector3(0,1.35,.55).applyQuaternion(cs.q));target=desired.clone().addScaledVector(forward,18)}else if(cameraMode==='ball'){desired=bs.p.clone().addScaledVector(forward,-8).add(new THREE.Vector3(0,4.5,0)).addScaledVector(right,2);target=bs.p.clone()}else{const t=performance.now()*.00035,center=cs.p.clone().lerp(bs.p,.4);desired=center.clone().add(new THREE.Vector3(Math.sin(t)*14,7.5,Math.cos(t)*14));target=center}cineCamera.position.lerp(desired,1-Math.exp(-dt*5));cineCamera.lookAt(target);cameraFocus.lerp(target,1-Math.exp(-dt*5))}
  cameraDrone.visible=(currentMode==='film'||currentMode==='replay')&&cameraMode!=='driver';if(cameraDrone.visible){const dpos=cameraFocus.clone().add(new THREE.Vector3(7,8,7));cameraDrone.position.lerp(dpos,1-Math.exp(-dt*3));cameraDrone.lookAt(cameraFocus)}cyanLight.position.copy(cs.p).add(new THREE.Vector3(0,5,0));}

function animate(now){requestAnimationFrame(animate);const dt=Math.min(.04,(now-last)/1000);last=now;if(replay.active&&lastTake){if(replay.playing){replayAccumulator+=dt*30*replay.rate;while(replayAccumulator>=1){replayAccumulator--;replay.index++;if(replay.index>=lastTake.frames.length){replay.index=lastTake.frames.length-1;replay.playing=false;if(replayExporting){replayExporting=false;stopCanvasCapture();$('videoBtn').disabled=false;$('videoBtn').textContent='SAVE';banner('VIDEO READY',cameraMode.toUpperCase()+' REPLAY',800)}}applyReplayFrame(lastTake.frames[replay.index])}}else applyReplayFrame(lastTake.frames[replay.index]);updateCamera(dt);updateTakeStatus();renderer.render(scene,camera);return}

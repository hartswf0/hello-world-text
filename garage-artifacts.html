<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSEQUENCE GARAGE · Artifact Roster</title>
<style>
  :root{ --ink:#0c0e12; --line:#2a2f38; --chalk:#f3f4f6; --dim:#8b93a1; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--ink);overflow:hidden;
    font-family:"DIN Alternate","Bahnschrift","Arial Narrow",system-ui,sans-serif;
    color:var(--chalk);-webkit-font-smoothing:antialiased}
  #app{position:fixed;inset:0} canvas{display:block}
  .hud{position:fixed;left:0;right:0;top:0;padding:18px 22px;display:flex;align-items:baseline;gap:14px;
    pointer-events:none;background:linear-gradient(180deg,rgba(10,11,15,.82),rgba(10,11,15,0));z-index:5}
  .hud h1{font-size:clamp(15px,2vw,22px);letter-spacing:.42em;font-weight:700;text-transform:uppercase}
  .hud .sub{font-size:11px;letter-spacing:.34em;color:var(--dim);text-transform:uppercase}
  .legend{position:fixed;right:18px;bottom:18px;z-index:5;border:1px solid var(--line);
    background:rgba(16,18,24,.82);backdrop-filter:blur(4px);padding:12px 14px;max-width:270px}
  .legend .lab{font-size:10px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin-bottom:8px}
  .legend ol{list-style:none;font-size:11px;line-height:1.9;letter-spacing:.02em;columns:2;column-gap:14px}
  .legend ol li{white-space:nowrap;cursor:pointer;transition:color .15s}
  .legend ol li:hover{color:#fff}
  .legend ol li b{display:inline-block;width:14px;color:var(--dim)}
  .hint{position:fixed;left:18px;bottom:18px;z-index:5;font-size:10px;letter-spacing:.26em;
    color:var(--dim);text-transform:uppercase;line-height:1.8}
  .hint kbd{border:1px solid var(--line);padding:1px 5px;border-radius:2px;color:#cfd5df;font-family:inherit}
  .tag{position:fixed;z-index:4;pointer-events:none;transform:translate(-50%,-100%);
    font-size:10px;letter-spacing:.22em;text-transform:uppercase;white-space:nowrap;
    padding:3px 7px;border:1px solid var(--line);background:rgba(12,14,18,.92);opacity:0;transition:opacity .15s}
  .tag .n{color:var(--dim);margin-right:6px}
  .tag .f{color:var(--dim);margin-left:6px;letter-spacing:.12em}
</style>
</head>
<body>
<div id="app"></div>
<div class="hud">
  <h1>Consequence Garage</h1>
  <span class="sub">Artifact Roster · 09 Unlockables</span>
</div>
<div class="legend">
  <div class="lab">Starting Grid · click to focus</div>
  <ol id="grid">
    <li data-i="0"><b>1</b>Stapler</li>
    <li data-i="1"><b>2</b>Salad Spinner</li>
    <li data-i="2"><b>3</b>Toaster</li>
    <li data-i="3"><b>4</b>Floor Lamp</li>
    <li data-i="4"><b>5</b>Crumb Sweeper</li>
    <li data-i="5"><b>6</b>Kettle</li>
    <li data-i="6"><b>7</b>Step Stool</li>
    <li data-i="7"><b>8</b>Coat Rack</li>
    <li data-i="8"><b>9</b>Suitcase</li>
  </ol>
</div>
<div class="hint"><kbd>drag</kbd> orbit · <kbd>scroll</kbd> zoom · <kbd>hover</kbd> name · <kbd>click</kbd> focus</div>
<div class="tag" id="tag"><span class="n"></span><span class="t"></span><span class="f"></span></div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" }}
</script>

<script type="module">
import * as THREE from 'three';

/* ===== RENDERER / SCENE / CAMERA ===== */
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
app.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0c0e12); scene.fog=new THREE.Fog(0x0c0e12,26,66);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,200);

/* ===== PROCEDURAL ENV MAP ===== */
function buildEnvMap(){
  const es=new THREE.Scene();
  es.add(new THREE.Mesh(new THREE.SphereGeometry(50,24,12),new THREE.ShaderMaterial({side:THREE.BackSide,
    uniforms:{top:{value:new THREE.Color(0x3a4660)},bot:{value:new THREE.Color(0x0a0c10)}},
    vertexShader:`varying vec3 vP; void main(){vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vP; uniform vec3 top; uniform vec3 bot; void main(){float h=clamp(normalize(vP).y*0.5+0.5,0.,1.); gl_FragColor=vec4(mix(bot,top,h),1.);}`})));
  const lm=new THREE.MeshBasicMaterial({color:0xfff4e0});
  for(let i=-2;i<=2;i++){const s=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.4,30),lm);s.position.set(i*8,22,0);es.add(s);}
  const cm=new THREE.MeshBasicMaterial({color:0x6f8bd0});
  [[-18,8,-10],[18,6,12]].forEach(p=>{const pn=new THREE.Mesh(new THREE.BoxGeometry(14,8,0.5),cm);pn.position.set(p[0],p[1],p[2]);es.add(pn);});
  const pm=new THREE.PMREMGenerator(renderer); const rt=pm.fromScene(es,0.04); pm.dispose(); return rt.texture;
}
const envMap=buildEnvMap(); scene.environment=envMap;

/* ===== LIGHTING ===== */
scene.add(new THREE.HemisphereLight(0x9fb0c8,0x14181f,0.44));
scene.add(new THREE.AmbientLight(0xffffff,0.24));
const key=new THREE.DirectionalLight(0xffffff,1.5); key.position.set(9,19,11); key.castShadow=true; key.shadow.mapSize.set(2048,2048);
{const d=20,c=key.shadow.camera;c.left=-d;c.right=d;c.top=d;c.bottom=-d;c.near=1;c.far=64;key.shadow.bias=-0.0004;key.shadow.normalBias=0.02;}
scene.add(key);
const rim=new THREE.DirectionalLight(0x6f8bd0,0.5); rim.position.set(-11,9,-9); scene.add(rim);

/* ===== GLASS (fresnel) ===== */
function makeGlass(tint,op){
  const m=new THREE.MeshPhysicalMaterial({color:tint,metalness:0,roughness:0.06,transparent:true,opacity:op,
    envMap:envMap,envMapIntensity:1.35,clearcoat:1,clearcoatRoughness:0.08,reflectivity:0.5,side:THREE.DoubleSide,depthWrite:false});
  m.onBeforeCompile=(sh)=>{sh.uniforms.uRim={value:new THREE.Color(0xbfd2e8)};
    sh.fragmentShader=sh.fragmentShader.replace('#include <common>','#include <common>\nuniform vec3 uRim;')
      .replace('#include <opaque_fragment>',`float fres=pow(1.0-clamp(dot(normalize(vViewPosition),normal),0.0,1.0),3.0);
        outgoingLight+=uRim*fres*0.9; diffuseColor.a=clamp(diffuseColor.a+fres*0.5,0.0,0.95);
        #include <opaque_fragment>`);}
  return m;
}
const GLASS_BLUE=()=>makeGlass(0x223447,0.5);   // dark tinted windows
const GLASS_CLEAR=()=>makeGlass(0xbfe0e8,0.16);  // clear bowl

/* ===== PALETTE + HELPERS ===== */
const C={
  blue:0x2a4bd0, blueLt:0x4f7be8, sky:0x6cb6e6, white:0xf4f5f7,
  red:0xc6362b, redDk:0x7e231c, orange:0xe6852a, orangeDk:0xc06d1e,
  green:0x4f8f3c, greenLt:0x7bbf4a, greenDk:0x336325, yellow:0xf2c61f, yellowDk:0xcaa314,
  black:0x14171d, steel:0x9aa3b0, chrome:0xd0d6de, dark:0x1a1d24, darker:0x0a0c10,
  toast:0xc98a3c, toastDk:0x9c6522, lettuce:0x6bbf4a, lettuceDk:0x4f9a3a,
  brown:0x6e4c2e, coir:0x8a6a3a, tan:0xc9a96a, tie:0xb5322a
};
function paint(hex,o){o=o||{};return new THREE.MeshPhysicalMaterial({color:hex,
  roughness:o.rough!==undefined?o.rough:0.42,metalness:o.metal!==undefined?o.metal:0.15,
  flatShading:o.flat!==undefined?o.flat:true,envMap:envMap,envMapIntensity:0.85,clearcoat:o.cc!==undefined?o.cc:0.5,clearcoatRoughness:0.35});}
function matte(hex,o){o=o||{};return new THREE.MeshStandardMaterial({color:hex,
  roughness:o.rough!==undefined?o.rough:0.85,metalness:o.metal!==undefined?o.metal:0,flatShading:true,envMap:envMap,envMapIntensity:0.4});}
function metalMat(hex,o){o=o||{};return new THREE.MeshStandardMaterial({color:hex,
  roughness:o.rough!==undefined?o.rough:0.28,metalness:0.92,flatShading:true,envMap:envMap,envMapIntensity:1.2});}
function emiss(color,intensity){return new THREE.MeshStandardMaterial({color:0xffffff,emissive:color,emissiveIntensity:intensity||2,roughness:0.3});}
function box(w,h,d,m){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);}
function cyl(rt,rb,h,m,rad){return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,rad||12),m);}
function cone(r,h,m,rad){return new THREE.Mesh(new THREE.ConeGeometry(r,h,rad||8),m);}
function sphere(r,m,wf,hf){return new THREE.Mesh(new THREE.SphereGeometry(r,wf||12,hf||9),m);}

/* small hard-rubber foot / wheel */
function tireFoot(r,w){const g=new THREE.Group();const t=cyl(r,r,w,matte(0x0f1115,{rough:0.95}),14);t.rotation.z=Math.PI/2;g.add(t);
  const hub=cyl(r*0.5,r*0.5,w+0.02,metalMat(C.chrome),8);hub.rotation.z=Math.PI/2;g.add(hub);return g;}
function caster(r){const g=new THREE.Group();const fork=box(0.12,0.16,0.06,metalMat(0x3a4049));fork.position.y=r*0.7;g.add(fork);
  const w=cyl(r,r,0.12,matte(0x101216,{rough:0.9}),12);w.rotation.z=Math.PI/2;g.add(w);
  const cap=cyl(r*0.4,r*0.4,0.14,metalMat(C.steel),8);cap.rotation.z=Math.PI/2;g.add(cap);return g;}

/* glow sprite for indicator lights */
let _gt=null; function glowTex(){if(_gt)return _gt;const cv=document.createElement('canvas');cv.width=cv.height=64;const x=cv.getContext('2d');
  const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.4,'rgba(255,255,255,0.45)');g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g;x.fillRect(0,0,64,64);_gt=new THREE.CanvasTexture(cv);return _gt;}
function glow(color){return new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex(),color:color,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));}

/* decals */
function decalCanvas(draw,w,h){w=w||128;h=h||128;const cv=document.createElement('canvas');cv.width=w;cv.height=h;draw(cv.getContext('2d'),w,h);
  const tx=new THREE.CanvasTexture(cv);tx.colorSpace=THREE.SRGBColorSpace;tx.anisotropy=4;return tx;}
function decalPlane(drawFn,w,h){const tx=decalCanvas(drawFn,Math.round(w*160),Math.round(h*160));
  return new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshStandardMaterial({map:tx,roughness:0.55,metalness:0.05,envMap:envMap,envMapIntensity:0.3,transparent:true}));}
function numberPlane(num,size,bg,fg){size=size||0.9;bg=bg||'#f4f5f7';fg=fg||'#14171d';
  return decalPlane((ctx,w,h)=>{ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);ctx.fillStyle=fg;
    ctx.font='bold 84px "Arial Narrow",Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(num,w/2,h/2+4);},size,size);}
function textDecal(lines,w,h,bg,fg,frac){return decalPlane((ctx,cw,ch)=>{ if(bg){ctx.fillStyle=bg;ctx.fillRect(0,0,cw,ch);} else ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle=fg;ctx.font='bold '+Math.round(ch*(frac||0.32))+'px "Arial Narrow",Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  const arr=Array.isArray(lines)?lines:[lines]; const lh=ch/(arr.length+0.4);
  arr.forEach((ln,i)=>ctx.fillText(ln,cw/2,lh*(i+0.7)));},w,h);}
function mapleLeaf(size){return decalPlane((ctx,w,h)=>{ctx.clearRect(0,0,w,h);ctx.fillStyle='#c6362b';ctx.beginPath();
  const cx=w/2,cy=h*0.56,s=w*0.34;
  ctx.moveTo(cx,cy-s);ctx.lineTo(cx+s*0.28,cy-s*0.32);ctx.lineTo(cx+s*0.62,cy-s*0.42);ctx.lineTo(cx+s*0.42,cy-s*0.05);
  ctx.lineTo(cx+s*0.8,cy+s*0.1);ctx.lineTo(cx+s*0.34,cy+s*0.22);ctx.lineTo(cx+s*0.12,cy+s*0.7);
  ctx.lineTo(cx,cy+s*0.5);ctx.lineTo(cx-s*0.12,cy+s*0.7);ctx.lineTo(cx-s*0.34,cy+s*0.22);
  ctx.lineTo(cx-s*0.8,cy+s*0.1);ctx.lineTo(cx-s*0.42,cy-s*0.05);ctx.lineTo(cx-s*0.62,cy-s*0.42);
  ctx.lineTo(cx-s*0.28,cy-s*0.32);ctx.closePath();ctx.fill();},size,size);}
function swissCross(size){return decalPlane((ctx,w,h)=>{ctx.clearRect(0,0,w,h);ctx.fillStyle='#f4f5f7';
  const t=w*0.24,L=w*0.66,o=(w-L)/2;ctx.fillRect(w/2-t/2,o,t,L);ctx.fillRect(o,h/2-t/2,L,t);},size,size);}
function drawStar(ctx,cx,cy,spikes,outer,inner){let rot=-Math.PI/2;ctx.beginPath();ctx.moveTo(cx+Math.cos(rot)*outer,cy+Math.sin(rot)*outer);
  for(let i=0;i<spikes;i++){rot+=Math.PI/spikes;ctx.lineTo(cx+Math.cos(rot)*inner,cy+Math.sin(rot)*inner);rot+=Math.PI/spikes;ctx.lineTo(cx+Math.cos(rot)*outer,cy+Math.sin(rot)*outer);}
  ctx.closePath();ctx.fill();}
function crescentStar(size){return decalPlane((ctx,w,h)=>{ctx.clearRect(0,0,w,h);ctx.fillStyle='#f4f5f7';
  ctx.beginPath();ctx.arc(w*0.44,h*0.5,w*0.3,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(w*0.54,h*0.5,w*0.24,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='source-over';ctx.fillStyle='#f4f5f7';drawStar(ctx,w*0.7,h*0.5,5,w*0.11,w*0.05);},size,size);}
function nzSticker(w,h){return decalPlane((ctx,cw,ch)=>{ctx.fillStyle='#1e2b3a';ctx.beginPath();ctx.arc(cw/2,ch/2,Math.min(cw,ch)*0.46,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a5a7a';ctx.beginPath();ctx.moveTo(cw*0.2,ch*0.66);ctx.lineTo(cw*0.42,ch*0.36);ctx.lineTo(cw*0.56,ch*0.52);ctx.lineTo(cw*0.7,ch*0.3);ctx.lineTo(cw*0.82,ch*0.66);ctx.closePath();ctx.fill();
  ctx.fillStyle='#f4f5f7';ctx.beginPath();ctx.moveTo(cw*0.42,ch*0.36);ctx.lineTo(cw*0.5,ch*0.45);ctx.lineTo(cw*0.34,ch*0.45);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(cw*0.7,ch*0.3);ctx.lineTo(cw*0.78,ch*0.4);ctx.lineTo(cw*0.62,ch*0.4);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#c6362b';ctx.lineWidth=cw*0.03;ctx.beginPath();ctx.arc(cw/2,ch/2,Math.min(cw,ch)*0.44,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#c6362b';ctx.font='bold '+Math.round(ch*0.12)+'px Arial';ctx.textAlign='center';ctx.fillText('NEW ZEALAND',cw/2,ch*0.84);},w,h);}
function welcomeMat(text){return decalPlane((ctx,w,h)=>{ctx.fillStyle='#8a6a3a';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='#6b4f28';ctx.lineWidth=2;for(let i=0;i<w;i+=6){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,h);ctx.stroke();}
  ctx.strokeStyle='#3a2c16';ctx.lineWidth=w*0.03;ctx.strokeRect(w*0.05,h*0.08,w*0.9,h*0.84);
  ctx.fillStyle='#2a2012';ctx.font='bold '+Math.round(h*0.42)+'px "Arial Narrow",Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,w/2,h*0.5);},2.0,1.1);}

/* contact shadow */
let _ct=null; function contactTex(){if(_ct)return _ct;const cv=document.createElement('canvas');cv.width=cv.height=128;const x=cv.getContext('2d');
  const g=x.createRadialGradient(64,64,4,64,64,62);g.addColorStop(0,'rgba(0,0,0,0.55)');g.addColorStop(0.6,'rgba(0,0,0,0.25)');g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);_ct=new THREE.CanvasTexture(cv);return _ct;}
function contactShadow(w,d){const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),new THREE.MeshBasicMaterial({map:contactTex(),transparent:true,depthWrite:false}));
  m.rotation.x=-Math.PI/2;m.position.y=0.02;return m;}

/* branching antler (toaster / decor) */
function antler(m,s){s=s||1;const g=new THREE.Group();
  const beam=box(0.09*s,0.7*s,0.09*s,m);beam.position.y=0.32*s;beam.rotation.z=0.2;g.add(beam);
  [[0.5,0.35,0.5],[0.62,0.2,-0.3],[0.66,0.55,0.1]].forEach(t=>{const tn=cyl(0.05*s,0.03*s,0.32*s,m,6);
    tn.position.set(t[0]*s*0.3,t[1]*s,0);tn.rotation.z=-0.7+t[2];g.add(tn);});
  return g;}

/* ===== 1 · STAPLER (Standard/Cheetah) ===== */
function buildStapler(){
  const g=new THREE.Group();
  const blue=paint(C.blue),white=paint(C.white),red=paint(C.red),steel=metalMat(C.steel),dk=matte(C.darker);
  // chassis (red/white racing base)
  const chassis=box(0.95,0.26,2.7,red); chassis.position.set(0,0.42,0); g.add(chassis);
  const chWhite=box(0.97,0.14,2.5,white); chWhite.position.set(0,0.5,0); g.add(chWhite);
  // livery swoosh
  [-1,1].forEach(s=>{const sw=box(0.02,0.18,1.6,blue);sw.position.set(s*0.49,0.46,-0.2);g.add(sw);});
  // lower jaw with metal staple track
  const jaw=box(0.62,0.18,2.0,steel); jaw.position.set(0,0.66,0.05); g.add(jaw);
  const track=box(0.3,0.06,1.7,metalMat(0xb8bec7)); track.position.set(0,0.77,0.1); g.add(track);
  const anvil=box(0.34,0.05,0.3,metalMat(C.chrome)); anvil.position.set(0,0.72,1.0); g.add(anvil);
  // hinge at back
  const hinge=cyl(0.1,0.1,0.66,metalMat(0x3a4049)); hinge.rotation.z=Math.PI/2; hinge.position.set(0,0.82,-1.15); g.add(hinge);
  // UPPER ARM (hinged) — cheetah-back wedge
  const arm=new THREE.Group(); arm.position.set(0,0.82,-1.15);
  const body=box(0.64,0.34,2.2,blue); body.position.set(0,0.16,1.15); arm.add(body);
  const nose=cone(0.34,0.7,blue,4); nose.rotation.x=Math.PI/2; nose.rotation.z=Math.PI/4; nose.scale.set(1,1,0.6); nose.position.set(0,0.2,2.4); arm.add(nose);
  [-1,1].forEach(s=>{const side=box(0.06,0.28,2.0,white);side.position.set(s*0.33,0.14,1.2);arm.add(side);
    const acc=box(0.05,0.1,2.0,red);acc.position.set(s*0.35,-0.02,1.2);arm.add(acc);});
  // #26 decal on top
  const num=numberPlane('26',0.5); num.rotation.x=-Math.PI/2; num.rotation.z=0; num.position.set(0,0.34,1.5); arm.add(num);
  // rear spoiler (F1 tail) at the hinge end
  const post=box(0.06,0.34,0.06,dk); post.position.set(0,0.3,-0.05); arm.add(post);
  const wing=box(0.8,0.07,0.34,red); wing.position.set(0,0.48,-0.1); arm.add(wing);
  [-1,1].forEach(s=>{const ep=box(0.05,0.24,0.34,white);ep.position.set(s*0.38,0.4,-0.1);arm.add(ep);});
  g.add(arm);
  // four tire feet
  [[-0.5,1.05],[0.5,1.05],[-0.5,-1.0],[0.5,-1.0]].forEach(p=>{const f=tireFoot(0.28,0.22);f.position.set(p[0],0.28,p[1]);g.add(f);});
  // FUNNY: a bent staple behind, like a skid mark
  const staple=new THREE.Group(); staple.position.set(0.7,0.06,-1.9);
  const sm=metalMat(0xc4ccd6);
  const top=box(0.3,0.03,0.03,sm); staple.add(top);
  const l1=box(0.03,0.03,0.16,sm); l1.position.set(-0.135,0,0.08); staple.add(l1);
  const l2=box(0.03,0.03,0.16,sm); l2.position.set(0.135,0,0.08); staple.add(l2);
  staple.rotation.y=0.4; g.add(staple);
  g.add(contactShadow(2.2,3.4));
  // press animation every few seconds
  g.userData.tick=(t)=>{const p=t%4.5; const press=p<0.5?Math.sin(p/0.5*Math.PI)*0.32:0; arm.rotation.x=press;};
  return g;
}

/* ===== 2 · SALAD SPINNER (Scarab) ===== */
function buildSpinner(){
  const g=new THREE.Group();
  const dk=matte(C.dark),blue=paint(C.blue);
  // clear bowl

  const cross2=swissCross(0.5); cross2.position.set(0,2.5,-0.5); cross2.rotation.y=Math.PI; g.add(cross2);
  // two big curved ibex-horn hooks at top
  [-1,1].forEach(s=>{const H=new THREE.Group();H.position.set(0,3.5,0);
    const seg1=cyl(0.09,0.11,0.5,chrome,8);seg1.position.set(s*0.25,0.15,0);seg1.rotation.z=s*0.9;H.add(seg1);
    const seg2=cyl(0.07,0.09,0.5,chrome,8);seg2.position.set(s*0.6,0.35,0);seg2.rotation.z=s*0.4;H.add(seg2);
    const tip=cyl(0.05,0.07,0.4,chrome,8);tip.position.set(s*0.82,0.62,0);tip.rotation.z=-s*0.2;H.add(tip);
    const ball=sphere(0.06,chrome,8,6);ball.position.set(s*0.86,0.82,0);H.add(ball);g.add(H);});
  // smaller side hooks
  [0,1,2,3].forEach(i=>{const a=i/4*Math.PI*2+0.4;const hk=new THREE.Group();hk.position.set(Math.cos(a)*0.45,2.7,Math.sin(a)*0.45);
    const arm=cyl(0.05,0.06,0.32,chrome,6);arm.rotation.z=Math.PI/2;arm.rotation.y=a;arm.position.set(Math.cos(a)*0.14,0,Math.sin(a)*0.14);hk.add(arm);
    const up=cyl(0.04,0.05,0.14,chrome,6);up.position.set(Math.cos(a)*0.28,0.08,Math.sin(a)*0.28);hk.add(up);g.add(hk);});
  // FUNNY: a red necktie on the highest horn
  const tie=new THREE.Group(); tie.position.set(-0.86,4.3,0.05);
  const knot=box(0.12,0.14,0.08,paint(C.tie)); tie.add(knot);
  const t1=box(0.16,0.5,0.05,paint(C.tie)); t1.position.set(0,-0.35,0); tie.add(t1);
  const t2=box(0.22,0.3,0.05,paint(C.tie)); t2.position.set(0,-0.7,0); tie.add(t2);
  const tip=cone(0.12,0.2,paint(C.tie),4); tip.rotation.x=Math.PI; tip.position.set(0,-0.92,0); tie.add(tip);
  g.add(tie);
  // FUNNY: an umbrella in the tray
  const umb=new THREE.Group(); umb.position.set(0.2,0.6,0.15); umb.rotation.z=0.25;
  const shaft=cyl(0.03,0.03,1.4,metalMat(0x3a4049)); shaft.position.y=0.5; umb.add(shaft);
  const canopy=cone(0.32,0.4,paint(0x2a3a5a),8); canopy.position.y=1.25; umb.add(canopy);
  const hook=new THREE.Mesh(new THREE.TorusGeometry(0.06,0.02,6,10,Math.PI),metalMat(0x3a4049)); hook.position.set(0,-0.2,0); hook.rotation.z=Math.PI/2; umb.add(hook);
  g.add(umb);
  g.add(contactShadow(2.2,2.2));
  g.userData.tick=(t)=>{tie.rotation.z=Math.sin(t*1.4)*0.05; tie.rotation.x=Math.sin(t*1.1)*0.04;};
  return g;
}

/* ===== 9 · SUITCASE (Nomad/Tortoise) ===== */
function buildSuitcase(){
  const g=new THREE.Group();
  const white=paint(C.white,{rough:0.4}),blue=paint(C.blue),black=matte(C.darker),chrome=metalMat(C.chrome);
  // shell (rounded hard-shell)
  const shell=box(1.8,2.3,1.0,white); shell.position.set(0,1.45,0); g.add(shell);
  const shellTop=box(1.6,0.35,0.85,white); shellTop.position.set(0,2.7,0); g.add(shellTop); // raised upper compartment
  // hard-shell ridge lines
  for(let i=-1;i<=1;i++){const rg=box(1.82,0.05,1.02,matte(0xdfe2e7,{rough:0.6}));rg.position.set(0,1.45+i*0.5,0);g.add(rg);}
  // blue horizontal stripe
  const stripe=box(1.82,0.2,1.02,blue); stripe.position.set(0,2.15,0); g.add(stripe);
  // dark blue-tinted camper windows (front) - three
  [-0.5,0,0.5].forEach(x=>{const win=box(0.42,0.42,0.06,GLASS_BLUE());win.position.set(x,1.7,0.52);g.add(win);
    const frame=box(0.48,0.48,0.04,black);frame.position.set(x,1.7,0.5);g.add(frame);
    // re-add glass in front of frame
    const win2=box(0.42,0.42,0.05,GLASS_BLUE());win2.position.set(x,1.7,0.53);g.add(win2);});
  // black corner bumpers (8)
  [[-0.9,0.55,0.5],[0.9,0.55,0.5],[-0.9,0.55,-0.5],[0.9,0.55,-0.5],[-0.9,2.55,0.5],[0.9,2.55,0.5],[-0.9,2.55,-0.5],[0.9,2.55,-0.5]].forEach(p=>{
    const bm=box(0.22,0.22,0.22,black);bm.position.set(p[0],p[1],p[2]);g.add(bm);});
  // NZ travel sticker
  const st=nzSticker(0.7,0.7); st.position.set(0.92,1.4,0.1); st.rotation.y=Math.PI/2; g.add(st);
  // four caster wheels
  [[-0.72,0.42],[0.72,0.42],[-0.72,-0.42],[0.72,-0.42]].forEach(p=>{const c=caster(0.2);c.position.set(p[0],0.2,p[1]);g.add(c);});
  // retractable handle (tortoise neck) — extends
  const handle=new THREE.Group(); handle.position.set(0,2.85,0);
  [-0.5,0.5].forEach(x=>{const post=box(0.08,0.9,0.08,chrome);post.position.set(x,0.45,0);handle.add(post);});
  const bar=box(1.1,0.1,0.12,chrome); bar.position.set(0,0.9,0); handle.add(bar);
  const grip=box(0.7,0.14,0.16,matte(0x2a2f38)); grip.position.set(0,0.9,0); handle.add(grip);
  g.add(handle);
  // FUNNY: KIA ORA welcome mat in front
  const mat=welcomeMat('KIA ORA'); mat.rotation.x=-Math.PI/2; mat.position.set(0,0.03,1.9); g.add(mat);
  g.add(contactShadow(2.4,1.6));
  g.userData.tick=(t)=>{const ext=(Math.sin(t*0.5)*0.5+0.5); handle.position.y=2.85+ext*0.5;}; // handle slides up/down like a neck
  return g;
}

/* ===== FLOOR ===== */
const floorMat=new THREE.MeshStandardMaterial({color:0x141720,roughness:0.62,metalness:0.28,envMap:envMap,envMapIntensity:0.55});
const floor=box(80,0.1,80,floorMat); floor.position.y=-0.06; floor.receiveShadow=true; scene.add(floor);

/* ===== LAYOUT 3×3 ===== */
const roster=[
  ['1','Stapler','Racing',        buildStapler],
  ['2','Salad Spinner','Argentina',buildSpinner],
  ['3','Toaster','Norway',        buildToaster],
  ['4','Floor Lamp','Netherlands',buildLamp],
  ['5','Crumb Sweeper','Canada',  buildSweeper],
  ['6','Kettle','Türkiye',        buildKettle],
  ['7','Step Stool','USA',        buildStool],
  ['8','Coat Rack','Switzerland', buildCoatRack],
  ['9','Suitcase','New Zealand',  buildSuitcase],
];
const GAP=8.6; const items=[]; const tilePos=[];
roster.forEach((r,i)=>{
  const col=i%3,row=Math.floor(i/3); const x=(col-1)*GAP,z=(row-1)*GAP;
  tilePos.push(new THREE.Vector3(x,0,z));
  const tile=box(GAP-0.3,0.12,GAP-0.3,new THREE.MeshStandardMaterial({color:0x1c2027,roughness:0.85,metalness:0.1,envMap:envMap,envMapIntensity:0.25}));
  tile.position.set(x,-0.05,z); tile.receiveShadow=true; scene.add(tile);
  const frame=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(GAP-0.3,0.12,GAP-0.3)),new THREE.LineBasicMaterial({color:0x394150}));
  frame.position.copy(tile.position); scene.add(frame);
  const stencil=numberPlane(r[0],0.95,'#1c2027','#aeb6c2'); stencil.material.transparent=true; stencil.rotation.x=-Math.PI/2;
  stencil.position.set(x-GAP/2+1.15,0.03,z-GAP/2+1.15); scene.add(stencil);
  const a=r[3](); a.position.set(x,0,z); a.rotation.y=-0.5;
  a.traverse(o=>{if(o.isMesh){o.castShadow=true; if(o.receiveShadow!==false) o.receiveShadow=true;}});
  a.userData.num=r[0]; a.userData.name=r[1]; a.userData.country=r[2];
  scene.add(a); items.push(a);
});

/* ===== ORBIT + FOCUS ===== */
const target=new THREE.Vector3(0,1.2,0),targetGoal=target.clone();
let azim=0,polar=0.9,radius=24,radiusGoal=24,dragging=false,px=0,py=0,moved=0;
const minPolar=0.16,maxPolar=1.46,minR=8,maxR=46;
function applyCam(){const sp=Math.sin(polar),cp=Math.cos(polar);camera.position.set(target.x+radius*sp*Math.sin(azim),target.y+radius*cp,target.z+radius*sp*Math.cos(azim));camera.lookAt(target);}
const el=renderer.domElement;
el.addEventListener('pointerdown',e=>{dragging=true;moved=0;px=e.clientX;py=e.clientY;el.setPointerCapture(e.pointerId);});
el.addEventListener('pointerup',e=>{dragging=false;if(moved<5)tryPick(e);});
el.addEventListener('pointerleave',()=>dragging=false);
el.addEventListener('pointermove',e=>{if(dragging){moved+=Math.abs(e.movementX)+Math.abs(e.movementY);azim-=(e.clientX-px)*0.005;polar=Math.min(maxPolar,Math.max(minPolar,polar-(e.clientY-py)*0.005));px=e.clientX;py=e.clientY;}updateHover(e);});
el.addEventListener('wheel',e=>{e.preventDefault();radiusGoal=Math.min(maxR,Math.max(minR,radiusGoal+e.deltaY*0.014));},{passive:false});
let pinchD=0;
el.addEventListener('touchmove',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);if(pinchD)radiusGoal=Math.min(maxR,Math.max(minR,radiusGoal+(pinchD-d)*0.05));pinchD=d;e.preventDefault();}},{passive:false});
el.addEventListener('touchend',()=>pinchD=0);
function focusOn(i){targetGoal.copy(tilePos[i]).add(new THREE.Vector3(0,1.4,0));radiusGoal=11;}
function unfocus(){targetGoal.set(0,1.2,0);radiusGoal=24;}
const ray=new THREE.Raycaster(),ndc=new THREE.Vector2();
const tag=document.getElementById('tag');const tagN=tag.querySelector('.n'),tagT=tag.querySelector('.t'),tagF=tag.querySelector('.f');
function rootOf(o){while(o.parent&&!o.userData.name)o=o.parent;return o;}
function updateHover(e){ndc.x=(e.clientX/innerWidth)*2-1;ndc.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(ndc,camera);const hits=ray.intersectObjects(items,true);
  if(hits.length){const o=rootOf(hits[0].object);if(o.userData.name){tagN.textContent='#'+o.userData.num;tagT.textContent=o.userData.name;tagF.textContent='· '+o.userData.country;tag.style.left=e.clientX+'px';tag.style.top=(e.clientY-14)+'px';tag.style.opacity='1';el.style.cursor='pointer';return;}}
  tag.style.opacity='0';el.style.cursor='grab';}
let focused=-1;
function tryPick(e){ndc.x=(e.clientX/innerWidth)*2-1;ndc.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(ndc,camera);const hits=ray.intersectObjects(items,true);
  if(hits.length){const o=rootOf(hits[0].object);const i=items.indexOf(o);if(i>=0){if(focused===i){focused=-1;unfocus();}else{focused=i;focusOn(i);}}}else{focused=-1;unfocus();}}
document.getElementById('grid').addEventListener('click',e=>{const li=e.target.closest('li');if(!li)return;const i=+li.dataset.i;if(focused===i){focused=-1;unfocus();}else{focused=i;focusOn(i);}});

/* ===== ANIMATE ===== */
const t0=performance.now();
function loop(){const t=(performance.now()-t0)/1000;
  radius+=(radiusGoal-radius)*0.08;target.lerp(targetGoal,0.08);applyCam();
  items.forEach((a,i)=>{const sway=(focused===i)?0:Math.sin(t*0.25+i)*0.3;a.rotation.y=-0.5+sway;if(a.userData.tick)a.userData.tick(t);});
  renderer.render(scene,camera);requestAnimationFrame(loop);}
applyCam();loop();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>

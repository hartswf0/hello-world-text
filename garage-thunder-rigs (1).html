<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHOLOGICAL THUNDER RIGS · High-Voltage Adventurers</title>
<style>
  :root{ --ink:#0b0d12; --line:#2a2f38; --chalk:#f3f4f6; --dim:#8b93a1; --volt:#7fd0ff; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--ink);overflow:hidden;
    font-family:"DIN Alternate","Bahnschrift","Arial Narrow",system-ui,sans-serif;
    color:var(--chalk);-webkit-font-smoothing:antialiased}
  #app{position:fixed;inset:0} canvas{display:block}
  .hud{position:fixed;left:0;right:0;top:0;padding:16px 22px;pointer-events:none;
    background:linear-gradient(180deg,rgba(9,10,14,.86),rgba(9,10,14,0));z-index:5}
  .hud h1{font-size:clamp(16px,2.2vw,26px);letter-spacing:.3em;font-weight:800;text-transform:uppercase}
  .hud .sub{font-size:11px;letter-spacing:.5em;color:var(--volt);text-transform:uppercase;margin-top:2px}
  .legend{position:fixed;right:18px;bottom:18px;z-index:5;border:1px solid var(--line);
    background:rgba(14,16,22,.84);backdrop-filter:blur(4px);padding:12px 14px;max-width:300px}
  .legend .lab{font-size:10px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin-bottom:8px}
  .legend ol{list-style:none;font-size:11px;line-height:1.9;letter-spacing:.02em;columns:2;column-gap:14px}
  .legend ol li{white-space:nowrap;cursor:pointer;transition:color .15s}
  .legend ol li:hover{color:var(--volt)}
  .legend ol li b{display:inline-block;width:14px;color:var(--dim)}
  .hint{position:fixed;left:18px;bottom:18px;z-index:5;font-size:10px;letter-spacing:.26em;
    color:var(--dim);text-transform:uppercase;line-height:1.8}
  .hint kbd{border:1px solid var(--line);padding:1px 5px;border-radius:2px;color:#cfd5df;font-family:inherit}
  .tag{position:fixed;z-index:4;pointer-events:none;transform:translate(-50%,-100%);
    font-size:10px;letter-spacing:.2em;text-transform:uppercase;white-space:nowrap;
    padding:3px 7px;border:1px solid var(--line);background:rgba(11,13,18,.92);opacity:0;transition:opacity .15s}
  .tag .n{color:var(--dim);margin-right:6px}
  .tag .f{color:var(--volt);margin-left:6px;letter-spacing:.1em}
</style>
</head>
<body>
<div id="app"></div>
<div class="hud">
  <h1>Mythological Thunder Rigs</h1>
  <div class="sub">The High-Voltage Adventurers</div>
</div>
<div class="legend">
  <div class="lab">Storm Grid · click to focus</div>
  <ol id="grid">
    <li data-i="0"><b>1</b>Thor</li>
    <li data-i="1"><b>2</b>Zeus</li>
    <li data-i="2"><b>3</b>Raijin</li>
    <li data-i="3"><b>4</b>Tlaloc</li>
    <li data-i="4"><b>5</b>Perun</li>
    <li data-i="5"><b>6</b>Shango</li>
    <li data-i="6"><b>7</b>Indra</li>
    <li data-i="7"><b>8</b>Lei Gong</li>
    <li data-i="8"><b>9</b>Thunderbird</li>
  </ol>
</div>
<div class="hint"><kbd>drag</kbd> orbit · <kbd>scroll</kbd> zoom · <kbd>hover</kbd> name · <kbd>click</kbd> focus</div>
<div class="tag" id="tag"><span class="n"></span><span class="t"></span><span class="f"></span></div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" }}
</script>

<script type="module">
import * as THREE from 'three';

/* ===== RENDERER / SCENE / CAMERA ===== */
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
app.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0b0d12); scene.fog=new THREE.Fog(0x0b0d12,30,74);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,200);

/* ===== PROCEDURAL ENV MAP (storm sky: cool dome + hot strips) ===== */
function buildEnvMap(){
  const es=new THREE.Scene();
  es.add(new THREE.Mesh(new THREE.SphereGeometry(50,24,12),new THREE.ShaderMaterial({side:THREE.BackSide,
    uniforms:{top:{value:new THREE.Color(0x2c3a5c)},bot:{value:new THREE.Color(0x090a0e)}},
    vertexShader:`varying vec3 vP; void main(){vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vP; uniform vec3 top; uniform vec3 bot; void main(){float h=clamp(normalize(vP).y*0.5+0.5,0.,1.); gl_FragColor=vec4(mix(bot,top,h),1.);}`})));
  const lm=new THREE.MeshBasicMaterial({color:0xeaf2ff});
  for(let i=-2;i<=2;i++){const s=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.4,30),lm);s.position.set(i*8,22,0);es.add(s);}
  const cm=new THREE.MeshBasicMaterial({color:0x7fd0ff});
  [[-18,8,-10],[18,6,12]].forEach(p=>{const pn=new THREE.Mesh(new THREE.BoxGeometry(14,8,0.5),cm);pn.position.set(p[0],p[1],p[2]);es.add(pn);});
  const pm=new THREE.PMREMGenerator(renderer); const rt=pm.fromScene(es,0.04); pm.dispose(); return rt.texture;
}
const envMap=buildEnvMap(); scene.environment=envMap;

/* ===== LIGHTING ===== */
scene.add(new THREE.HemisphereLight(0x8ea6cc,0x12141c,0.42));
scene.add(new THREE.AmbientLight(0xffffff,0.22));
const key=new THREE.DirectionalLight(0xffffff,1.45); key.position.set(9,19,11); key.castShadow=true; key.shadow.mapSize.set(2048,2048);
{const d=22,c=key.shadow.camera;c.left=-d;c.right=d;c.top=d;c.bottom=-d;c.near=1;c.far=66;key.shadow.bias=-0.0004;key.shadow.normalBias=0.02;}
scene.add(key);
const rim=new THREE.DirectionalLight(0x7fd0ff,0.55); rim.position.set(-11,9,-9); scene.add(rim);

/* ===== GLASS ===== */
function makeGlass(tint,op){
  const m=new THREE.MeshPhysicalMaterial({color:tint,metalness:0,roughness:0.06,transparent:true,opacity:op,
    envMap:envMap,envMapIntensity:1.35,clearcoat:1,clearcoatRoughness:0.08,reflectivity:0.5,side:THREE.DoubleSide,depthWrite:false});
  m.onBeforeCompile=(sh)=>{sh.uniforms.uRim={value:new THREE.Color(0xbfd2e8)};
    sh.fragmentShader=sh.fragmentShader.replace('#include <common>','#include <common>\nuniform vec3 uRim;')
      .replace('#include <opaque_fragment>',`float fres=pow(1.0-clamp(dot(normalize(vViewPosition),normal),0.0,1.0),3.0);
        outgoingLight+=uRim*fres*0.9; diffuseColor.a=clamp(diffuseColor.a+fres*0.5,0.0,0.95); #include <opaque_fragment>`);}
  return m;
}
const GLASS_BLUE=()=>makeGlass(0x2a4866,0.44);

/* ===== PALETTE + HELPERS ===== */
const C={
  volt:0x7fd0ff, voltDeep:0x2a6ad0, gold:0xd8a83a, goldDk:0xa87a22, white:0xf4f5f7, cream:0xe8dcc0,
  iron:0x3a4049, ironDk:0x24282f, black:0x14171d, darker:0x0a0c10, steel:0x9aa3b0, chrome:0xd0d6de,
  red:0xc0392b, redDk:0x7e231c, crimson:0x8a2a3a, oni:0xb03a2a, jade:0x3a8a72, jadeDk:0x25604e,
  teal:0x19e6c8, blue:0x2a4bd0, royal:0x1e3a8a, skin:0xd8a878, skinDk:0xa87a52, beard:0xc9b89a, beardW:0xe8e2d4,
  wood:0x6a4a2a, woodDk:0x4a3420, drum:0x8a3a2a, grey:0x8a929c, tan:0xc9a96a, elephant:0x6a7078, elephantDk:0x4a5058,
  feathersR:0xc0392b, feathersB:0x2a4bd0, feathersY:0xe6b52a
};
function paint(hex,o){o=o||{};return new THREE.MeshPhysicalMaterial({color:hex,
  roughness:o.rough!==undefined?o.rough:0.48,metalness:o.metal!==undefined?o.metal:0.15,
  flatShading:o.flat!==undefined?o.flat:true,envMap:envMap,envMapIntensity:0.8,clearcoat:o.cc!==undefined?o.cc:0.35,clearcoatRoughness:0.4});}
function matte(hex,o){o=o||{};return new THREE.MeshStandardMaterial({color:hex,
  roughness:o.rough!==undefined?o.rough:0.85,metalness:o.metal!==undefined?o.metal:0,flatShading:true,envMap:envMap,envMapIntensity:0.4});}
function metalMat(hex,o){o=o||{};return new THREE.MeshStandardMaterial({color:hex,
  roughness:o.rough!==undefined?o.rough:0.3,metalness:0.92,flatShading:true,envMap:envMap,envMapIntensity:1.15});}
function goldMat(){return metalMat(C.gold,{rough:0.32});}
function emiss(color,i){return new THREE.MeshStandardMaterial({color:0xffffff,emissive:color,emissiveIntensity:i||2,roughness:0.3});}
function box(w,h,d,m){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);}
function cyl(rt,rb,h,m,rad){return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,rad||12),m);}
function cone(r,h,m,rad){return new THREE.Mesh(new THREE.ConeGeometry(r,h,rad||8),m);}
function sphere(r,m,wf,hf){return new THREE.Mesh(new THREE.SphereGeometry(r,wf||12,hf||9),m);}
function ico(r,d,m){return new THREE.Mesh(new THREE.IcosahedronGeometry(r,d||1),m);}
function torus(r,t,m,arc){return new THREE.Mesh(new THREE.TorusGeometry(r,t,8,18,arc||Math.PI*2),m);}
function eye(r){r=r||0.06;const g=new THREE.Group();
  const b=sphere(r,new THREE.MeshStandardMaterial({color:0x070a0d,roughness:0.12,metalness:0.2,envMap:envMap,envMapIntensity:1.1}),8,7);g.add(b);
  const hi=sphere(r*0.32,new THREE.MeshBasicMaterial({color:0xffffff}),5,4);hi.position.set(r*0.34,r*0.34,r*0.55);g.add(hi);return g;}

/* glow sprite */
let _gt=null;function glowTex(){if(_gt)return _gt;const cv=document.createElement('canvas');cv.width=cv.height=64;const x=cv.getContext('2d');
  const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.4,'rgba(255,255,255,0.45)');g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g;x.fillRect(0,0,64,64);_gt=new THREE.CanvasTexture(cv);return _gt;}
function glow(c){return new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex(),color:c,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));}

/* ============================================================
   LIGHTNING — chunky low-poly bolt: jagged chain of thin
   emissive boxes.  Registered globally; each bolt flickers
   and re-strikes (re-randomizes its jag) on its own clock.
   ============================================================ */
const BOLTS=[];
function jaggedBolt(len,segs,thick,color,opts){opts=opts||{};
  const g=new THREE.Group();
  const m=emiss(color||C.volt,3.2);
  const parts=[];
  for(let i=0;i<segs;i++){const b=box(thick,thick,1,m);g.add(b);parts.push(b);}
  const cap=glow(color||C.volt);cap.scale.set(thick*10,thick*10,1);g.add(cap);
  function strike(){
    let p=new THREE.Vector3(0,0,0);
    let dir=new THREE.Vector3(0,-1,0);
    const step=len/segs;
    for(let i=0;i<segs;i++){
      const jit=new THREE.Vector3((Math.random()-0.5)*step*1.4,0,(Math.random()-0.5)*step*1.4);
      const q=p.clone().add(dir.clone().multiplyScalar(step)).add(jit);
      const mid=p.clone().add(q).multiplyScalar(0.5);
      const d=q.clone().sub(p);
      parts[i].position.copy(mid);
      parts[i].scale.z=d.length();
      parts[i].quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),d.clone().normalize());
      p=q;
    }
    cap.position.copy(p);
  }
  strike();
  g.userData.strike=strike;
  g.userData.phase=Math.random()*10;
  g.userData.period=opts.period||(1.2+Math.random()*1.6);
  g.userData.duty=opts.duty||0.22;      // fraction of period visible
  BOLTS.push(g);
  return g;
}
function tickBolts(t){
  BOLTS.forEach(b=>{
    const local=(t+b.userData.phase)%b.userData.period;
    const on=local<b.userData.period*b.userData.duty;
    if(on && !b.visible){b.userData.strike();}
    b.visible=on;
  });
}

/* wheels: knobby monster tire + hub */
function knobbyWheel(r,w,hubHex){const g=new THREE.Group();
  const t=cyl(r,r,w,matte(0x101216,{rough:0.95}),12);t.rotation.z=Math.PI/2;t.castShadow=true;g.add(t);
  for(let i=0;i<8;i++){const a=i/8*Math.PI*2;const knob=box(w*1.04,r*0.24,r*0.3,matte(0x1a1d22,{rough:0.95}));
    knob.position.set(0,Math.cos(a)*r*0.95,Math.sin(a)*r*0.95);knob.rotation.x=-a;g.add(knob);}
  const hub=cyl(r*0.5,r*0.5,w+0.03,metalMat(hubHex||C.steel),8);hub.rotation.z=Math.PI/2;g.add(hub);
  return g;}
function slickWheel(r,w,hubHex){const g=new THREE.Group();
  const t=cyl(r,r,w,matte(0x0f1115,{rough:0.9}),14);t.rotation.z=Math.PI/2;t.castShadow=true;g.add(t);
  const hub=cyl(r*0.55,r*0.55,w+0.02,metalMat(hubHex||C.chrome),8);hub.rotation.z=Math.PI/2;g.add(hub);return g;}

/* decals */
function decalCanvas(draw,w,h){w=w||128;h=h||128;const cv=document.createElement('canvas');cv.width=w;cv.height=h;draw(cv.getContext('2d'),w,h);
  const tx=new THREE.CanvasTexture(cv);tx.colorSpace=THREE.SRGBColorSpace;tx.anisotropy=4;return tx;}
function decalPlane(drawFn,w,h){const tx=decalCanvas(drawFn,Math.round(w*160),Math.round(h*160));
  return new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshStandardMaterial({map:tx,roughness:0.5,metalness:0.05,envMap:envMap,envMapIntensity:0.3,transparent:true}));}
function boltDecal(size,color){return decalPlane((ctx,w,h)=>{ctx.clearRect(0,0,w,h);ctx.fillStyle=color||'#7fd0ff';
  ctx.beginPath();ctx.moveTo(w*0.58,h*0.05);ctx.lineTo(w*0.30,h*0.55);ctx.lineTo(w*0.48,h*0.55);ctx.lineTo(w*0.40,h*0.95);
  ctx.lineTo(w*0.72,h*0.42);ctx.lineTo(w*0.54,h*0.42);ctx.closePath();ctx.fill();},size,size);}
function numDecal(num,size,bg,fg){return decalPlane((ctx,w,h)=>{if(bg){ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);}else ctx.clearRect(0,0,w,h);
  ctx.fillStyle=fg||'#f4f5f7';ctx.font='bold '+Math.round(h*0.8)+'px "Arial Narrow",Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(num,w/2,h*0.55);},size,size);}
function runeDecal(size){return decalPlane((ctx,w,h)=>{ctx.clearRect(0,0,w,h);ctx.strokeStyle='#7fd0ff';ctx.lineWidth=w*0.07;ctx.lineCap='square';
  // sowilo-like zigzag rune
  ctx.beginPath();ctx.moveTo(w*0.62,h*0.1);ctx.lineTo(w*0.38,h*0.42);ctx.lineTo(w*0.62,h*0.58);ctx.lineTo(w*0.38,h*0.9);ctx.stroke();},size,size);}
function tomoeDecal(size){return decalPlane((ctx,w,h)=>{ctx.clearRect(0,0,w,h);ctx.fillStyle='#e8dcc0';
  ctx.beginPath();ctx.arc(w/2,h/2,w*0.44,0,6.283);ctx.fill();ctx.fillStyle='#8a2a1a';
  for(let i=0;i<3;i++){const a=i*Math.PI*2/3;const cx=w/2+Math.cos(a)*w*0.16,cyy=h/2+Math.sin(a)*w*0.16;
    ctx.beginPath();ctx.arc(cx,cyy,w*0.13,0,6.283);ctx.fill();
    ctx.beginPath();ctx.arc(w/2+Math.cos(a+0.7)*w*0.26,h/2+Math.sin(a+0.7)*w*0.26,w*0.07,0,6.283);ctx.fill();}},size,size);}
function greekKey(wid,hei){return decalPlane((ctx,w,h)=>{ctx.clearRect(0,0,w,h);ctx.strokeStyle='#a87a22';ctx.lineWidth=h*0.14;
  const u=h*0.7;let x=h*0.2;ctx.beginPath();
  while(x<w-u){ctx.moveTo(x,h*0.8);ctx.lineTo(x,h*0.2);ctx.lineTo(x+u*0.6,h*0.2);ctx.lineTo(x+u*0.6,h*0.55);ctx.lineTo(x+u*0.25,h*0.55);x+=u;}
  ctx.stroke();},wid,hei);}

/* contact shadow */
let _ct=null;function contactTex(){if(_ct)return _ct;const cv=document.createElement('canvas');cv.width=cv.height=128;const x=cv.getContext('2d');
  const g=x.createRadialGradient(64,64,4,64,64,62);g.addColorStop(0,'rgba(0,0,0,0.55)');g.addColorStop(0.6,'rgba(0,0,0,0.25)');g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);_ct=new THREE.CanvasTexture(cv);return _ct;}
function contactShadow(w,d){const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),new THREE.MeshBasicMaterial({map:contactTex(),transparent:true,depthWrite:false}));
  m.rotation.x=-Math.PI/2;m.position.y=0.02;return m;}

/* simple god figure core: torso+head+arms, customized per rig */
function figure(skinHex,torsoM,o){o=o||{};const g=new THREE.Group();
  const skin=paint(skinHex,{rough:0.65,metal:0.05});
  const torso=box(o.tw||0.6,o.th||0.7,o.td||0.4,torsoM);torso.position.y=0.35;g.add(torso);
  const head=box(0.34,0.36,0.32,skin);head.position.y=0.95;g.add(head);
  g.userData.head=head;
  const armL=new THREE.Group();armL.position.set(-(o.tw||0.6)/2-0.08,0.6,0);
  const armR=new THREE.Group();armR.position.set((o.tw||0.6)/2+0.08,0.6,0);
  [armL,armR].forEach(a=>{const up=box(0.16,0.5,0.16,torsoM);up.position.y=-0.2;a.add(up);
    const hand=box(0.14,0.14,0.14,skin);hand.position.y=-0.5;a.add(hand);g.add(a);});
  g.userData.armL=armL;g.userData.armR=armR;
  return g;}

/* ============================================================
   1 · MONSTER TRUCK / THOR — Mjölnir grille, runes, two goats
   ============================================================ */
function buildThor(){
  const g=new THREE.Group();
  const iron=paint(C.iron,{rough:0.5,metal:0.4}),ironD=matte(C.ironDk),dk=matte(C.darker),glass=GLASS_BLUE();
  // heavy truck body high on suspension
  const body=box(2.3,0.9,3.6,iron);body.position.set(0,1.85,0);g.add(body);
  const cabTop=box(1.9,0.7,1.4,iron);cabTop.position.set(0,2.55,0.5);g.add(cabTop);
  const wind=box(1.7,0.5,0.08,glass);wind.position.set(0,2.6,1.22);wind.rotation.x=-0.15;g.add(wind);
  const bed=box(2.1,0.5,1.3,ironD);bed.position.set(0,2.25,-1.0);g.add(bed);
  // Mjölnir-shaped grille: hammer head + haft
  const hammerHead=box(1.3,0.7,0.4,metalMat(0x7a828c,{rough:0.35}));hammerHead.position.set(0,1.9,1.95);g.add(hammerHead);
  const haft=box(0.24,0.8,0.3,matte(C.woodDk));haft.position.set(0,1.2,1.95);g.add(haft);
  const knot=torus(0.16,0.05,goldMat());knot.position.set(0,0.85,1.95);g.add(knot);
  // blue rune glow strips + headlights
  [-0.7,0.7].forEach(x=>{const h=box(0.34,0.2,0.06,emiss(C.volt,2.6));h.position.set(x,2.05,1.83);g.add(h);
    const hg=glow(C.volt);hg.scale.set(0.7,0.5,1);hg.position.set(x,2.05,1.95);g.add(hg);});
  [-1,1].forEach(s=>{const rn=runeDecal(0.6);rn.position.set(s*1.16,1.9,0.4);rn.rotation.y=s*Math.PI/2;g.add(rn);
    const zz=boltDecal(0.5,'#7fd0ff');zz.position.set(s*1.16,1.95,-0.6);zz.rotation.y=s*Math.PI/2;g.add(zz);});
  // suspension springs (teal)
  [[-1.2,1.3],[1.2,1.3],[-1.2,-1.3],[1.2,-1.3]].forEach(p=>{const spr=new THREE.Group();spr.position.set(p[0]*0.85,1.3,p[1]);
    for(let i=0;i<3;i++){const ring=torus(0.14,0.04,paint(C.teal,{rough:0.4,metal:0.3}));ring.rotation.x=Math.PI/2;ring.position.y=i*0.14-0.14;spr.add(ring);}g.add(spr);});
  // THOR in the cab: winged helmet + hammer raised
  const thor=figure(C.skin,paint(0x2a3a5c,{rough:0.6}));thor.position.set(-0.35,2.5,0.4);thor.scale.set(0.9,0.9,0.9);
  const helm=cyl(0.22,0.24,0.2,metalMat(C.steel),8);helm.position.y=1.16;thor.add(helm);
  [-1,1].forEach(s=>{const wing=box(0.05,0.26,0.18,paint(C.white));wing.position.set(s*0.26,1.22,0);wing.rotation.z=s*0.4;thor.add(wing);});

  [-1,1].forEach(s=>{const eyeP=decalPlane((ctx,w,h)=>{ctx.clearRect(0,0,w,h);ctx.fillStyle='#f4f5f7';
      ctx.beginPath();ctx.moveTo(0,h*0.8);ctx.lineTo(w*0.9,h*0.1);ctx.lineTo(w,h*0.5);ctx.lineTo(w*0.2,h);ctx.closePath();ctx.fill();
      ctx.fillStyle='#14171d';ctx.beginPath();ctx.arc(w*0.55,h*0.5,w*0.14,0,6.283);ctx.fill();},0.6,0.4);
    eyeP.rotation.x=-Math.PI/2;eyeP.rotation.z=s>0?-0.5:0.5+Math.PI;eyeP.position.set(s*0.5,1.92,1.4);rig.add(eyeP);});
  // feather chevrons layered along the flanks (red/yellow/blue)
  [-1,1].forEach(s=>{for(let i=0;i<5;i++){const cols=[fr,fy,fb];const f=box(0.06,0.3,0.55,cols[i%3]);
    f.position.set(s*1.02,1.6+((i%2)*0.2),1.1-i*0.55);f.rotation.x=0.5;rig.add(f);}});
  // roof light pods
  const bar=box(1.3,0.14,0.24,dk);bar.position.set(0,2.48,0.3);rig.add(bar);
  for(let i=-2;i<=2;i++){const pod=cyl(0.08,0.08,0.08,emiss(0x9fd0ff,2.4),8);pod.rotation.x=Math.PI/2;pod.position.set(i*0.26,2.48,0.44);rig.add(pod);
    const pg=glow(0x9fd0ff);pg.scale.set(0.3,0.3,1);pg.position.set(i*0.26,2.48,0.5);rig.add(pg);}
  // big number 9 on the door
  [-1,1].forEach(s=>{const n9=numDecal('9',0.7,null,'#f4f5f7');n9.position.set(s*1.03,1.6,0.15);n9.rotation.y=s*Math.PI/2;rig.add(n9);});
  // TAIL = spread wing fan (red/yellow/blue feathers)
  const tail=new THREE.Group();tail.position.set(0,1.9,-1.85);
  const NT=9;
  for(let i=0;i<NT;i++){const cols=[fr,fy,fb];const holder=new THREE.Group();
    const a=(i/(NT-1)-0.5)*Math.PI*0.9;holder.rotation.z=-a;
    const f=box(0.2,1.1,0.06,cols[i%3]);f.position.y=0.6;holder.add(f);
    const tip=cone(0.1,0.24,cols[(i+1)%3],4);tip.position.y=1.2;holder.add(tip);
    tail.add(holder);}
  tail.rotation.x=-0.5;rig.add(tail);
  // long-travel suspension arms (rear extended, mid-jump)
  [-1,1].forEach(s=>{const arm=box(0.1,0.1,1.2,metalMat(0x6a7280));arm.position.set(s*0.7,0.85,-1.2);arm.rotation.x=0.5;rig.add(arm);
    const shock=cyl(0.06,0.06,0.9,paint(C.feathersY),8);shock.position.set(s*0.85,1.1,-1.2);shock.rotation.x=0.3;rig.add(shock);});
  g.add(rig);
  // wheels: fronts tucked (airborne), rears dropped
  const wf1=knobbyWheel(0.62,0.5,0xe6b52a);wf1.position.set(-1.05,1.35,1.35);g.add(wf1);
  const wf2=knobbyWheel(0.62,0.5,0xe6b52a);wf2.position.set(1.05,1.35,1.35);g.add(wf2);
  const wr1=knobbyWheel(0.62,0.5,0xe6b52a);wr1.position.set(-1.05,0.68,-1.5);g.add(wr1);
  const wr2=knobbyWheel(0.62,0.5,0xe6b52a);wr2.position.set(1.05,0.68,-1.5);g.add(wr2);
  // lightning under the airborne truck (it jumps ON the storm)
  const tb1=jaggedBolt(1.2,5,0.05,C.volt,{period:0.8});tb1.position.set(0.7,0.9,0.3);g.add(tb1);
  const tb2=jaggedBolt(1.0,4,0.05,C.volt,{period:1.2});tb2.position.set(-0.8,0.8,-0.6);g.add(tb2);
  // dust puffs behind the rear wheels
  [[-1.1],[1.1]].forEach(p=>{const puff=ico(0.4,1,matte(0x4a4438,{rough:1}));puff.position.set(p[0],0.35,-2.2);puff.scale.y=0.5;g.add(puff);});
  g.add(contactShadow(3.4,4.6));
  g.userData.tick=(t)=>{rig.position.y=0.5+Math.sin(t*1.3)*0.06;rig.rotation.x=-0.16+Math.sin(t*1.3)*0.02;
    tail.children.forEach((h,i)=>h.rotation.x=Math.sin(t*2+i*0.4)*0.04);
    [wf1,wf2].forEach(w=>w.rotation.x=t*3);[wr1,wr2].forEach(w=>w.rotation.x=t*5);};
  return g;
}

/* ===== FLOOR ===== */
const floorMat=new THREE.MeshStandardMaterial({color:0x12151d,roughness:0.6,metalness:0.3,envMap:envMap,envMapIntensity:0.55});
const floor=box(94,0.1,94,floorMat); floor.position.y=-0.06; floor.receiveShadow=true; scene.add(floor);

/* ===== LAYOUT 3×3 ===== */
const roster=[
  ['1','Monster Truck','Thor',      buildThor],
  ['2','Hovercraft','Zeus',         buildZeus],
  ['3','Drift Trike','Raijin',      buildRaijin],
  ['4','Swamp Buggy','Tlaloc',      buildTlaloc],
  ['5','Bulldozer','Perun',         buildPerun],
  ['6','Boom Truck','Shango',       buildShango],
  ['7','Elephant Crawler','Indra',  buildIndra],
  ['8','Biplane','Lei Gong',        buildLeiGong],
  ['9','Trophy Truck','Thunderbird',buildThunderbird],
];
const GAP=10.0; const items=[]; const tilePos=[];
roster.forEach((r,i)=>{
  const col=i%3,row=Math.floor(i/3); const x=(col-1)*GAP,z=(row-1)*GAP;
  tilePos.push(new THREE.Vector3(x,0,z));
  const tile=box(GAP-0.3,0.12,GAP-0.3,new THREE.MeshStandardMaterial({color:0x1a1e28,roughness:0.85,metalness:0.1,envMap:envMap,envMapIntensity:0.25}));
  tile.position.set(x,-0.05,z); tile.receiveShadow=true; scene.add(tile);
  const frame=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(GAP-0.3,0.12,GAP-0.3)),new THREE.LineBasicMaterial({color:0x36405a}));
  frame.position.copy(tile.position); scene.add(frame);
  const stencil=decalPlane((ctx,w,h)=>{ctx.fillStyle='#1a1e28';ctx.fillRect(0,0,w,h);ctx.fillStyle='#9fb0d0';
    ctx.font='bold '+Math.round(h*0.7)+'px "Arial Narrow",Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(r[0],w/2,h*0.55);},0.9,0.9);
  stencil.material.transparent=true; stencil.rotation.x=-Math.PI/2;
  stencil.position.set(x-GAP/2+1.2,0.03,z-GAP/2+1.2); scene.add(stencil);
  const a=r[3](); a.position.set(x,0,z); a.rotation.y=-0.5;
  a.traverse(o=>{if(o.isMesh){o.castShadow=true; if(o.receiveShadow!==false) o.receiveShadow=true;}});
  a.userData.num=r[0]; a.userData.name=r[1]; a.userData.god=r[2];
  scene.add(a); items.push(a);
});

/* ===== ORBIT + FOCUS ===== */
const target=new THREE.Vector3(0,1.6,0),targetGoal=target.clone();
let azim=0,polar=0.9,radius=28,radiusGoal=28,dragging=false,px=0,py=0,moved=0;
const minPolar=0.16,maxPolar=1.46,minR=9,maxR=54;
function applyCam(){const sp=Math.sin(polar),cp=Math.cos(polar);camera.position.set(target.x+radius*sp*Math.sin(azim),target.y+radius*cp,target.z+radius*sp*Math.cos(azim));camera.lookAt(target);}
const el=renderer.domElement;
el.addEventListener('pointerdown',e=>{dragging=true;moved=0;px=e.clientX;py=e.clientY;el.setPointerCapture(e.pointerId);});
el.addEventListener('pointerup',e=>{dragging=false;if(moved<5)tryPick(e);});
el.addEventListener('pointerleave',()=>dragging=false);
el.addEventListener('pointermove',e=>{if(dragging){moved+=Math.abs(e.movementX)+Math.abs(e.movementY);azim-=(e.clientX-px)*0.005;polar=Math.min(maxPolar,Math.max(minPolar,polar-(e.clientY-py)*0.005));px=e.clientX;py=e.clientY;}updateHover(e);});
el.addEventListener('wheel',e=>{e.preventDefault();radiusGoal=Math.min(maxR,Math.max(minR,radiusGoal+e.deltaY*0.016));},{passive:false});
let pinchD=0;
el.addEventListener('touchmove',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);if(pinchD)radiusGoal=Math.min(maxR,Math.max(minR,radiusGoal+(pinchD-d)*0.05));pinchD=d;e.preventDefault();}},{passive:false});
el.addEventListener('touchend',()=>pinchD=0);
function focusOn(i){targetGoal.copy(tilePos[i]).add(new THREE.Vector3(0,1.8,0));radiusGoal=13;}
function unfocus(){targetGoal.set(0,1.6,0);radiusGoal=28;}
const ray=new THREE.Raycaster(),ndc=new THREE.Vector2();
const tag=document.getElementById('tag');const tagN=tag.querySelector('.n'),tagT=tag.querySelector('.t'),tagF=tag.querySelector('.f');
function rootOf(o){while(o.parent&&!o.userData.name)o=o.parent;return o;}
function updateHover(e){ndc.x=(e.clientX/innerWidth)*2-1;ndc.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(ndc,camera);const hits=ray.intersectObjects(items,true);
  if(hits.length){const o=rootOf(hits[0].object);if(o.userData.name){tagN.textContent='#'+o.userData.num;tagT.textContent=o.userData.name;tagF.textContent='· '+o.userData.god;tag.style.left=e.clientX+'px';tag.style.top=(e.clientY-14)+'px';tag.style.opacity='1';el.style.cursor='pointer';return;}}
  tag.style.opacity='0';el.style.cursor='grab';}
let focused=-1;
function tryPick(e){ndc.x=(e.clientX/innerWidth)*2-1;ndc.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(ndc,camera);const hits=ray.intersectObjects(items,true);
  if(hits.length){const o=rootOf(hits[0].object);const i=items.indexOf(o);if(i>=0){if(focused===i){focused=-1;unfocus();}else{focused=i;focusOn(i);}}}else{focused=-1;unfocus();}}
document.getElementById('grid').addEventListener('click',e=>{const li=e.target.closest('li');if(!li)return;const i=+li.dataset.i;if(focused===i){focused=-1;unfocus();}else{focused=i;focusOn(i);}});

/* ===== ANIMATE ===== */
const t0=performance.now();
function loop(){const t=(performance.now()-t0)/1000;
  radius+=(radiusGoal-radius)*0.08;target.lerp(targetGoal,0.08);applyCam();
  tickBolts(t);
  items.forEach((a,i)=>{const sway=(focused===i)?0:Math.sin(t*0.22+i)*0.26;a.rotation.y=-0.5+sway;if(a.userData.tick)a.userData.tick(t);});
  renderer.render(scene,camera);requestAnimationFrame(loop);}
applyCam();loop();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
